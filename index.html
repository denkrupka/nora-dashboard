// ============================================================
// UTILITY DRAWING
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Glow gradient cache to avoid recreating identical gradients every frame
const _glowCache = new Map();
function drawGlow(x, y, radius, color, alpha) {
  const key = `${radius}|${color}|${alpha}`;
  let stops = _glowCache.get(key);
  if (!stops) {
    stops = { c0: color + hex(alpha), c1: color + '00' };
    _glowCache.set(key, stops);
    if (_glowCache.size > 200) _glowCache.clear(); // prevent unbounded growth
  }
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, stops.c0);
  g.addColorStop(1, stops.c1);
  ctx.fillStyle = g;
  ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
}

function hex(a) {
  return Math.round(clamp(a, 0, 1) * 255).toString(16).padStart(2, '0');
}

function drawText(text, x, y, size, color, font, align) {
  ctx.font = `${size}px ${font || "'Share Tech Mono', monospace"}`;
  ctx.fillStyle = color || '#fff';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawTextGlow(text, x, y, size, color, font, align) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  drawText(text, x, y, size, color, font, align);
  ctx.restore();
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor(x, y, vx, vy, life, color, size, gravity, text) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.color = color;
    this.size = size || 3; this.gravity = gravity || 0; this.text = text || null;
    this.alpha = 1;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += this.gravity * dt;
    this.life -= dt;
    this.alpha = clamp(this.life / this.maxLife, 0, 1);
    return this.life > 0;
  }
  draw() {
    ctx.globalAlpha = this.alpha;
    if (this.text) {
      drawText(this.text, this.x, this.y, this.size, this.color, null, 'center');
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

const particles = [];
function spawnParticle(x, y, vx, vy, life, color, size, gravity, text) {
  if (particles.length < 500) {
    particles.push(new Particle(x, y, vx, vy, life, color, size, gravity, text));
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update(dt)) particles.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(p => p.draw());
}

// ============================================================
// FLOATING TEXT
// ============================================================
const floatingTexts = [];
function addFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 12, life: 2, maxLife: 2 });
}
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 30 * dt;
    ft.life -= dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.globalAlpha = clamp(ft.life / ft.maxLife, 0, 1);
    drawText(ft.text, ft.x, ft.y, ft.size, ft.color, null, 'center');
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// FLYING PACKETS (task transfer animation)
// ============================================================
const flyingPackets = []; // {fromIdx, toIdx, progress, duration, color, taskType}
const MAX_FLYING_PACKETS = 5;
const PACKET_TASK_TYPES = ['code', 'review', 'deploy', 'research', 'design', 'test'];

function spawnPacket(fromAgentId, toAgentId, taskType) {
  if (flyingPackets.length >= MAX_FLYING_PACKETS) return;
  const fromIdx = agents.findIndex(a => a.def.id === fromAgentId);
  const toIdx   = agents.findIndex(a => a.def.id === toAgentId);
  if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return;
  const fromAgent = agents[fromIdx];
  const auraColor = fromAgent.def.aura || '#00ff88';
  flyingPackets.push({
    fromIdx, toIdx,
    fromX: fromAgent.x, fromY: fromAgent.y,
    toX: agents[toIdx].x, toY: agents[toIdx].y,
    progress: 0,
    duration: 0.8,
    color: auraColor,
    taskType: taskType || 'task'
  });
}

function updatePackets(dt) {
  for (let i = flyingPackets.length - 1; i >= 0; i--) {
    const p = flyingPackets[i];
    // Update positions (agents may move)
    p.fromX = agents[p.fromIdx].x;
    p.fromY = agents[p.fromIdx].y;
    p.toX = agents[p.toIdx].x;
    p.toY = agents[p.toIdx].y;
    p.progress += dt / p.duration;
    if (p.progress >= 1.0) {
      flyingPackets.splice(i, 1);
      // Flash on arrival
      const target = agents[p.toIdx];
      addFloatingText(target.x, target.y - 30, '📦 ' + p.taskType, p.color, 10);
      // Burst particles at landing
      for (let j = 0; j < 8; j++) {
        spawnParticle(
          target.x, target.y - 10,
          rand(-60, 60), rand(-80, -20),
          1.2, p.color, rand(2, 5), 20
        );
      }
    }
  }
}

function drawPackets(ctx) {
  flyingPackets.forEach(p => {
    const t = p.progress;
    const x = lerp(p.fromX, p.toX, t);
    const y = lerp(p.fromY, p.toY, t) - Math.sin(Math.PI * t) * 80;

    // Trail (4 fading spheres behind)
    for (let ti = 1; ti <= 4; ti++) {
      const tt = Math.max(0, t - ti * 0.05);
      const tx = lerp(p.fromX, p.toX, tt);
      const ty = lerp(p.fromY, p.toY, tt) - Math.sin(Math.PI * tt) * 80;
      ctx.globalAlpha = 0.3 - ti * 0.06;
      ctx.beginPath();
      ctx.arc(tx, ty, 4 - ti * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Glow
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = p.color;

    // Main sphere
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();

    ctx.restore();

    // Task type label
    ctx.font = "8px 'Share Tech Mono', monospace";
    ctx.fillStyle = p.color;
    ctx.textAlign = 'center';
    ctx.fillText(p.taskType, x, y - 12);
    ctx.textAlign = 'left';
  });
}

// ============================================================
// SCANLINES CRT OVERLAY
// ============================================================
let _vignetteCache = { W: 0, H: 0, grad: null };
function drawScanlines() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
  // Vignette (cached)
  if (_vignetteCache.W !== W || _vignetteCache.H !== H) {
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.4)');
    _vignetteCache = { W, H, grad: vg };
  }
  ctx.fillStyle = _vignetteCache.grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ============================================================
// BACKGROUND GRADIENTS
// ============================================================
// Cached background gradients (recreated on resize)
let _bgCache = { W: 0, H: 0, SX: 0 };
function _rebuildBgCache() {
  _bgCache.W = W; _bgCache.H = H; _bgCache.SX = SPLIT_X;
  const c = _bgCache;
  c.offGrad = ctx.createLinearGradient(0, 0, 0, H);
  c.offGrad.addColorStop(0, '#060d1a'); c.offGrad.addColorStop(1, '#030810');
  c.burGrad = ctx.createLinearGradient(SPLIT_X, 0, SPLIT_X, H);
  c.burGrad.addColorStop(0, '#2a1818'); c.burGrad.addColorStop(1, '#1a1010');
  c.offAtmos = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  c.offAtmos.addColorStop(0, 'rgba(0,68,255,0.09)');
  c.offAtmos.addColorStop(0.5, 'rgba(0,44,180,0.04)');
  c.offAtmos.addColorStop(1, 'rgba(0,0,0,0)');
  c.burAtmos = ctx.createLinearGradient(SPLIT_X, 0, SPLIT_X, H * 0.55);
  c.burAtmos.addColorStop(0, 'rgba(255,120,20,0.14)');
  c.burAtmos.addColorStop(0.5, 'rgba(220,80,10,0.07)');
  c.burAtmos.addColorStop(1, 'rgba(0,0,0,0)');
  c.burWarm = ctx.createLinearGradient(SPLIT_X, 0, SPLIT_X, H);
  c.burWarm.addColorStop(0, 'rgba(255,130,50,0.10)');
  c.burWarm.addColorStop(0.5, 'rgba(255,110,30,0.05)');
  c.burWarm.addColorStop(1, 'rgba(0,0,0,0)');
}
function drawBackground() {
  if (_bgCache.W !== W || _bgCache.H !== H || _bgCache.SX !== SPLIT_X) _rebuildBgCache();
  ctx.fillStyle = _bgCache.offGrad;
  ctx.fillRect(0, 0, SPLIT_X, H);
  ctx.fillStyle = _bgCache.burGrad;
  ctx.fillRect(SPLIT_X, 0, W - SPLIT_X, H);
  ctx.fillStyle = _bgCache.offAtmos;
  ctx.fillRect(0, 0, SPLIT_X, H * 0.55);
  ctx.fillStyle = _bgCache.burAtmos;
  ctx.fillRect(SPLIT_X, 0, W - SPLIT_X, H * 0.55);
  ctx.fillStyle = _bgCache.burWarm;
  ctx.fillRect(SPLIT_X, 0, W - SPLIT_X, H);
}

  const cx = SPLIT_X;
  const holeY = H * 0.30;
  const holeH = H * 0.40;
  const holeW = 90; // увеличено с 40 до 90

  // Wall strip
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(cx - 12, 0, 24, H);

  // Outer glow around hole (warm amber — вход в нору светится)
  ctx.save();
  const holeGrad = ctx.createRadialGradient(cx, holeY + holeH / 2, 10, cx, holeY + holeH / 2, holeW + 40);
  holeGrad.addColorStop(0, 'rgba(255,100,20,0.18)');
  holeGrad.addColorStop(0.5, 'rgba(255,80,10,0.08)');
  holeGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = holeGrad;
  ctx.fillRect(cx - holeW - 40, holeY - 40, (holeW + 40) * 2, holeH + 80);
  ctx.restore();

  // Hole shape
  ctx.save();
  ctx.beginPath();
  // More jagged edges (bigger amplitude now)
  const pts = [];
  const steps = 28;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const y = holeY + t * holeH;
    // Seeded jag so it's deterministic (no Math.random in drawing)
    const jag = Math.sin(t * 17 + 1.3) * 14 + Math.sin(t * 9.7 + 0.7) * 8 + Math.sin(t * 4.1) * 5;
    pts.push({ lx: cx - holeW / 2 + jag, rx: cx + holeW / 2 - jag, y });
  }
  ctx.moveTo(pts[0].lx, pts[0].y);
  for (let i = 1; i <= steps; i++) ctx.lineTo(pts[i].lx, pts[i].y);
  for (let i = steps; i >= 0; i--) ctx.lineTo(pts[i].rx, pts[i].y);
  ctx.closePath();

  // Deep darkness inside hole
  ctx.fillStyle = '#000';
  ctx.fill();

  // Inner glow on hole edges (warm light from the burrow)
  ctx.save();
  const innerGrad = ctx.createLinearGradient(cx - holeW / 2, 0, cx + holeW / 2, 0);
  innerGrad.addColorStop(0,   'rgba(200,80,10,0.35)');
  innerGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  innerGrad.addColorStop(1,   'rgba(200,80,10,0.35)');
  ctx.fillStyle = innerGrad;
  ctx.fill();
  ctx.restore();

  ctx.restore(); // reset clip

  // Re-draw hole shape for glowing stroke
  ctx.save();
  ctx.beginPath();
  const pts2 = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const y = holeY + t * holeH;
    const jag = Math.sin(t * 17 + 1.3) * 14 + Math.sin(t * 9.7 + 0.7) * 8 + Math.sin(t * 4.1) * 5;
    pts2.push({ lx: cx - holeW / 2 + jag, rx: cx + holeW / 2 - jag, y });
  }
  ctx.moveTo(pts2[0].lx, pts2[0].y);
  for (let i = 1; i <= steps; i++) ctx.lineTo(pts2[i].lx, pts2[i].y);
  for (let i = steps; i >= 0; i--) ctx.lineTo(pts2[i].rx, pts2[i].y);
  ctx.closePath();
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur  = 18;
  ctx.strokeStyle = 'rgba(255,100,20,0.6)';
  ctx.lineWidth   = 2.5;
  ctx.stroke();
  ctx.restore();

  // Cracks radiating from hole (static, seeded)
  ctx.save();
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 1;
  const crackSeeds = [0.13,0.29,0.41,0.57,0.63,0.78,0.85,0.92,0.05,0.71];
  for (let i = 0; i < crackSeeds.length; i++) {
    const py = holeY + crackSeeds[i] * holeH;
    const dir = i % 2 === 0 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(cx + dir * holeW / 2, py);
    let dx = dir * holeW / 2, dy = 0;
    const steps2 = [14, 18, 22, 11, 16, 20, 13, 17, 19, 15];
    const dySeeds = [-4, 7, -9, 5, -6, 8, -3, 6, -7, 4];
    for (let j = 0; j < 4; j++) {
      dx += dir * (steps2[(i + j) % steps2.length]);
      dy += dySeeds[(i * 3 + j) % dySeeds.length];
      ctx.lineTo(cx + dx, py + dy);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Brick chunks hanging on edges
  ctx.save();
  ctx.fillStyle = '#2a1a1a';
  const brickData = [
    { t: 0.12, side: -1, ox: 3 }, { t: 0.28, side: 1, ox: -2 },
    { t: 0.45, side: -1, ox: 1 }, { t: 0.60, side: 1, ox: -4 },
    { t: 0.74, side: -1, ox: 2 }, { t: 0.88, side: 1, ox: -1 },
  ];
  brickData.forEach(b => {
    const by = holeY + b.t * holeH;
    const bx = cx + b.side * (holeW / 2 - 5) + b.ox;
    ctx.fillRect(bx - 10, by - 5, 20, 10);
    ctx.strokeStyle = '#1a0a0a'; ctx.lineWidth = 0.5;
    ctx.strokeRect(bx - 10, by - 5, 20, 10);
  });
  ctx.restore();
}

function drawCeiling() {
  const tileW = SPLIT_X / 8;
  const tileH = 30;
  // Ceiling tiles
  for (let i = 0; i < 8; i++) {
    const tx = i * tileW;
    ctx.fillStyle = i === 3 ? 'transparent' : '#0a1020';
    ctx.strokeStyle = '#0d1528';
    ctx.lineWidth = 1;
    if (i !== 3) {
      ctx.fillRect(tx, 0, tileW - 2, tileH);
      ctx.strokeRect(tx, 0, tileW - 2, tileH);
    }
  }
  // Fallen tile (tile 3 is missing - hanging)
  ctx.save();
  const ftx = 3 * tileW + tileW / 2;
  ctx.translate(ftx, tileH);
  ctx.rotate(Math.sin(frameCount * 0.005) * 0.05 + 0.3);
  ctx.fillStyle = '#0a1020';
  ctx.fillRect(-tileW / 2, 0, tileW - 2, tileH);
  ctx.strokeStyle = '#0d1528';
  ctx.strokeRect(-tileW / 2, 0, tileW - 2, tileH);
  ctx.restore();

  // Dark gap where tile fell
  ctx.fillStyle = '#000';
  ctx.fillRect(3 * tileW, 0, tileW - 2, tileH);
  // Cables hanging from gap
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 2;
  for (let c = 0; c < 3; c++) {
    const cx = 3 * tileW + 10 + c * 20;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.quadraticCurveTo(cx + Math.sin(frameCount * 0.02 + c) * 5, tileH + 20 + c * 10, cx - 5, tileH + 30 + c * 15);
    ctx.stroke();
  }

  // Neon lamps
  for (let i = 0; i < 4; i++) {
    const lx = SPLIT_X * (0.15 + i * 0.22);
    const isFlickering = (i === 2);
    let on = true;
    if (isFlickering) {
      on = ambient.lampOn;
      ambient.lampFlicker -= deltaTime;
      if (ambient.lampFlicker <= 0) {
        ambient.lampOn = !ambient.lampOn;
        ambient.lampFlicker = ambient.lampOn ? rand(1, 4) : rand(0.05, 0.2);
      }
    }
    if (on) {
      ctx.fillStyle = isFlickering ? 'rgba(100,200,255,0.5)' : 'rgba(80,160,220,0.3)';
      ctx.fillRect(lx - 30, tileH + 2, 60, 4);
      drawGlow(lx, tileH + 4, isFlickering ? 60 : 40, '#4488cc', isFlickering ? 0.2 : 0.1);
    }
    // Lamp fixture
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(lx - 35, tileH, 70, 6);
  }

  // Cables from ceiling to server
  ctx.strokeStyle = '#223';
  ctx.lineWidth = 1.5;
  for (let c = 0; c < 4; c++) {
    const startX = SPLIT_X * 0.5 + c * 15;
    ctx.beginPath();
    ctx.moveTo(startX, 0);
    ctx.bezierCurveTo(startX, H * 0.15, SPLIT_X * 0.85 + c * 5, H * 0.1, SPLIT_X * 0.85, H * 0.15 + c * 20);
    ctx.stroke();
  }
}

function drawDesk(desk, idx, providerColor) {
  const { x, y, w, h, monX, monY } = desk;

  // Desk body
  ctx.fillStyle = '#0c1825';
  ctx.strokeStyle = '#1a3050';
  ctx.lineWidth = 1;
  drawRoundRect(x, y, w, h, 3);
  ctx.fill();
  ctx.stroke();

  // Desk legs
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(x + 5, y + h, 4, 20);
  ctx.fillRect(x + w - 9, y + h, 4, 20);

  // Monitor
  const mw = 50, mh = 36;
  ctx.fillStyle = '#080808';
  ctx.strokeStyle = '#1a3050';
  drawRoundRect(monX, monY, mw, mh, 2);
  ctx.fill();
  ctx.stroke();
  // Monitor stand
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(monX + mw / 2 - 4, monY + mh, 8, 8);
  ctx.fillRect(monX + mw / 2 - 10, monY + mh + 8, 20, 3);

  // Screen content (scrolling code)
  ctx.save();
  ctx.beginPath();
  ctx.rect(monX + 2, monY + 2, mw - 4, mh - 4);
  ctx.clip();
  const scrollOff = (frameCount * 0.3 + idx * 100) % 200;
  // Если агент за столом — используем его провайдерный цвет (stripped to 6-hex for alpha concat below)
  const codeColors = providerColor
    ? [providerColor, providerColor, providerColor, '#ffffff', providerColor]
    : ['#00ff88', '#0088ff', '#ffaa00', '#ff44cc', '#44ffcc'];
  for (let line = 0; line < 12; line++) {
    const ly = monY + 4 + line * 3.5 - scrollOff % 14;
    if (ly < monY + 2 || ly > monY + mh - 2) continue;
    const cw = 5 + ((idx * 7 + line * 13) % 30);
    ctx.fillStyle = codeColors[(idx + line) % codeColors.length] + '60';
    ctx.fillRect(monX + 4, ly, cw, 2);
    if (line % 3 === 0) {
      ctx.fillStyle = codeColors[(idx + line + 2) % codeColors.length] + '40';
      ctx.fillRect(monX + 6 + cw, ly, 10, 2);
    }
  }
  ctx.restore();

  // Keyboard
  ctx.fillStyle = '#0a0a0a';
  ctx.strokeStyle = '#1a2030';
  ctx.lineWidth = 0.5;
  ctx.fillRect(x + w / 2 - 18, y + 5, 36, 12);
  ctx.strokeRect(x + w / 2 - 18, y + 5, 36, 12);
  // Keys
  for (let r = 0; r < 3; r++) {
    for (let k = 0; k < 8; k++) {
      ctx.fillStyle = '#151520';
      ctx.fillRect(x + w / 2 - 16 + k * 4, y + 7 + r * 3.5, 3, 2.5);
    }
  }

  // Stickers on desk edge
  const stickers = ['💾', '🔥', '⚡', '🐛', '☕'];
  const sticker = stickers[idx % stickers.length];
  ctx.font = '8px serif';
  ctx.fillText(sticker, x + w - 15, y + 3);

  // Mug or can
  if (idx % 2 === 0) {
    // Coffee mug
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + w - 20, y + 2, 8, 10);
    ctx.strokeStyle = '#334';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(x + w - 8, y + 7, 4, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();
  } else {
    // Energy drink can
    ctx.fillStyle = '#1a3010';
    ctx.fillRect(x + 8, y + 2, 6, 12);
    ctx.fillStyle = '#00ff44';
    ctx.fillRect(x + 8, y + 6, 6, 3);
  }

  // Crumpled papers and cables under desk
  ctx.fillStyle = '#111820';
  for (let p = 0; p < 3; p++) {
    const px = x + 10 + p * 25 + (idx * 7 % 10);
    const py = y + h + 15;
    ctx.beginPath();
    ctx.arc(px, py, 4 + p % 2 * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  // Cable
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w, y + h);
  ctx.quadraticCurveTo(x + w + 10, y + h + 25, x + w - 5, y + h + 20);
  ctx.stroke();
}

function drawServerRack() {
  const rx = SPLIT_X * 0.82;
  const ry = H * 0.12;
  const rw = SPLIT_X * 0.14;
  const rh = H * 0.55;
  const unitH = rh / 12;

  // Rack frame
  ctx.fillStyle = '#080c15';
  ctx.strokeStyle = '#1a2838';
  ctx.lineWidth = 2;
  drawRoundRect(rx, ry, rw, rh, 4);
  ctx.fill();
  ctx.stroke();

  // Side rails
  ctx.fillStyle = '#0f1a28';
  ctx.fillRect(rx + 2, ry + 2, 4, rh - 4);
  ctx.fillRect(rx + rw - 6, ry + 2, 4, rh - 4);

  // Units
  for (let u = 0; u < 11; u++) {
    const ux = rx + 8;
    const uy = ry + 6 + u * unitH;
    const uw = rw - 16;
    const uh = unitH - 4;

    ctx.fillStyle = '#0a1020';
    ctx.strokeStyle = '#152030';
    ctx.lineWidth = 0.5;
    drawRoundRect(ux, uy, uw, uh, 2);
    ctx.fill();
    ctx.stroke();

    // Ventilation holes
    for (let v = 0; v < 5; v++) {
      ctx.fillStyle = '#060810';
      ctx.fillRect(ux + 4 + v * (uw / 6), uy + uh / 2 - 1, uw / 8, 2);
    }

    // LED indicators
    const ledStates = ['ok', 'ok', 'working', 'ok', 'error', 'ok', 'working', 'ok', 'ok', 'ok', 'working'];
    const state = ledStates[u];
    let ledColor;
    if (state === 'ok') ledColor = '#00ff44';
    else if (state === 'error') ledColor = (Math.sin(frameCount * 0.1) > 0) ? '#ff2244' : '#440000';
    else ledColor = (Math.sin(frameCount * 0.15 + u) > 0) ? '#ffaa00' : '#332200';

    ctx.fillStyle = ledColor;
    ctx.beginPath();
    ctx.arc(ux + uw - 8, uy + uh / 2, 2, 0, Math.PI * 2);
    ctx.fill();
    drawGlow(ux + uw - 8, uy + uh / 2, 8, ledColor, 0.3);

    // Second LED for some units
    if (u % 3 === 0) {
      ctx.fillStyle = '#00ff44';
      ctx.beginPath();
      ctx.arc(ux + uw - 16, uy + uh / 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Hanging cables from rack
  const cableColors = ['#0044aa', '#00aa44', '#aa4400', '#aa0044', '#4400aa'];
  for (let c = 0; c < 5; c++) {
    ctx.strokeStyle = cableColors[c] + '80';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const cy = ry + (c + 2) * unitH;
    ctx.moveTo(rx + rw, cy);
    ctx.bezierCurveTo(
      rx + rw + 15, cy + 10,
      rx + rw + 5 + Math.sin(frameCount * 0.01 + c) * 5, cy + 30 + c * 5,
      rx + rw + 8, ry + rh + 10 + c * 3
    );
    ctx.stroke();
  }
}

function drawCoffeeMachine() {
  const cx = SPLIT_X * 0.05;
  const cy = H * 0.55;
  const cw = 40;
  const ch = 55;

  // Machine body
  ctx.fillStyle = '#1a1a2a';
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 1;
  drawRoundRect(cx, cy, cw, ch, 4);
  ctx.fill();
  ctx.stroke();

  // Display
  ctx.fillStyle = '#001100';
  ctx.fillRect(cx + 5, cy + 5, cw - 10, 12);
  ctx.fillStyle = '#00ff44';
  ctx.font = '6px "Share Tech Mono", monospace';
  ctx.fillText('COFFEE', cx + 7, cy + 13);

  // Buttons
  ctx.fillStyle = '#333';
  for (let b = 0; b < 3; b++) {
    ctx.beginPath();
    ctx.arc(cx + 10 + b * 10, cy + 24, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nozzle
  ctx.fillStyle = '#222';
  ctx.fillRect(cx + cw / 2 - 5, cy + 30, 10, 6);

  // Cup under nozzle
  ctx.fillStyle = '#ddd';
  ctx.fillRect(cx + cw / 2 - 7, cy + 38, 14, 10);
  ctx.fillStyle = '#5a3a1a';
  const fillLevel = ambient.coffeeOverflow ? 9 : 5 + Math.sin(frameCount * 0.02) * 2;
  ctx.fillRect(cx + cw / 2 - 5, cy + 38 + (10 - fillLevel), 10, fillLevel);

  // Overflow timer
  ambient.coffeeTimer += deltaTime;
  if (ambient.coffeeTimer > 20) {
    ambient.coffeeOverflow = true;
    if (ambient.coffeeTimer > 25) {
      ambient.coffeeOverflow = false;
      ambient.coffeeTimer = 0;
    }
  }

  // Coffee puddle
  if (ambient.coffeeOverflow) {
    ctx.fillStyle = '#3a2a1a80';
    ctx.beginPath();
    ctx.ellipse(cx + cw / 2, cy + ch + 5, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Paw prints near coffee machine
  ctx.fillStyle = '#2a1a1a30';
  for (let p = 0; p < 3; p++) {
    const px = cx + cw + 10 + p * 18;
    const py = cy + ch + 2 + Math.sin(p * 1.5) * 5;
    // Main pad
    ctx.beginPath();
    ctx.ellipse(px, py, 3, 4, Math.sin(p) * 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Toe pads
    for (let t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.arc(px - 3 + t * 3, py - 4, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Steam
  for (let s = 0; s < 3; s++) {
    const st = (frameCount * 0.03 + s * 1.5) % 3;
    const sx = cx + cw / 2 + Math.sin(frameCount * 0.02 + s * 2) * 4;
    const sy = cy + 32 - st * 10;
    ctx.globalAlpha = 0.15 * (1 - st / 3);
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(sx, sy, 3 + st * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Coffee puddle on floor
  ctx.fillStyle = '#2a1a0a40';
  ctx.beginPath();
  ctx.ellipse(cx + cw / 2 + 20, cy + ch + 10, 12, 5, 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawBurrowFloor() {
  // Wooden/dirt floor
  ctx.fillStyle = '#150a0a';
  ctx.fillRect(SPLIT_X, H * 0.88, W - SPLIT_X, H * 0.12);

  // Floor lines

    ctx.stroke();
  }
}

function drawTV() {
  const bp = getBurrowPositions();
  const { x, y, w, h } = bp.tv;

  // TV stand
  ctx.fillStyle = '#2a2020';
  ctx.fillRect(x + 10, y + h, w - 20, 15);
  // Legs
  ctx.fillRect(x + 15, y + h + 15, 6, 10);
  ctx.fillRect(x + w - 21, y + h + 15, 6, 10);

  // TV body (chunky old CRT)
  ctx.fillStyle = '#2a2a2a';
  ctx.strokeStyle = '#3a3030';
  ctx.lineWidth = 2;
  drawRoundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.stroke();

  // Screen
  const sx = x + 8, sy = y + 8, sw = w - 16, sh = h - 16;
  ctx.fillStyle = '#000';
  ctx.fillRect(sx, sy, sw, sh);

  // Screen content — cycle between noise, pixel game, censored content
  const tvMode = Math.floor(frameCount / 300) % 3;
  ctx.save();
  ctx.beginPath();
  ctx.rect(sx, sy, sw, sh);
  ctx.clip();

  if (tvMode === 0) {
    // Static noise (coarser grid for perf)
    for (let ny = 0; ny < sh; ny += 5) {
      for (let nx = 0; nx < sw; nx += 5) {
        const v = Math.random() * 80 | 0;
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(sx + nx, sy + ny, 5, 5);
      }
    }
  } else if (tvMode === 1) {
    // Pixel game (simple platformer)
    ctx.fillStyle = '#001133';
    ctx.fillRect(sx, sy, sw, sh);
    // Ground
    ctx.fillStyle = '#226622';
    ctx.fillRect(sx, sy + sh - 8, sw, 8);
    // Character
    const charX = sx + (frameCount * 0.5 % sw);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(charX, sy + sh - 16, 6, 8);
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(charX + 1, sy + sh - 20, 4, 4);
    // Blocks
    for (let b = 0; b < 3; b++) {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx + 20 + b * 30, sy + sh - 24 - b * 6, 14, 8);
    }
    // Coins
    ctx.fillStyle = '#ffdd00';
    for (let c = 0; c < 4; c++) {
      ctx.beginPath();
      ctx.arc(sx + 15 + c * 25, sy + sh - 30, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // "Content" with censor block
    ctx.fillStyle = '#1a0a0a';
    ctx.fillRect(sx, sy, sw, sh);
    // Silhouettes
    ctx.fillStyle = '#3a1a1a';
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.3, sy + sh * 0.5, 12, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.7, sy + sh * 0.5, 10, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // Censor square
    const censSize = 20 + Math.sin(frameCount * 0.03) * 3;
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + sw / 2 - censSize / 2, sy + sh / 2 - censSize / 2, censSize, censSize);
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + sw / 2 - censSize / 2, sy + sh / 2 - censSize / 2, censSize, censSize);
    ctx.fillStyle = '#ff0000';
    ctx.font = '6px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('18+', sx + sw / 2, sy + sh / 2 + 2);
    ctx.textAlign = 'left';
  }
  ctx.restore();

  // Power LED
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(x + w - 12, y + h - 6, 2, 0, Math.PI * 2);
  ctx.fill();

  // Console
  const consX = bp.console.x;
  const consY = bp.console.y;
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  drawRoundRect(consX, consY, 40, 12, 3);
  ctx.fill();
  ctx.stroke();
  // Blue LED
  ctx.fillStyle = '#0066ff';
  ctx.beginPath();
  ctx.arc(consX + 10, consY + 6, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Disc slot
  ctx.strokeStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(consX + 15, consY + 4);
  ctx.lineTo(consX + 35, consY + 4);
  ctx.stroke();

  // Gamepads
  ctx.fillStyle = '#222';
  // Pad 1
  drawRoundRect(consX - 15, consY + 15, 18, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(consX - 9, consY + 20, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0044aa';
  ctx.beginPath();
  ctx.arc(consX - 2, consY + 20, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Pad 2
  ctx.fillStyle = '#222';
  drawRoundRect(consX + 42, consY + 18, 18, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(consX + 48, consY + 23, 2, 0, Math.PI * 2);
  ctx.fill();

  // Game discs scattered
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  for (let d = 0; d < 3; d++) {
    const dx = consX + 5 + d * 20;
    const dy = consY + 32 + d * 3;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(d * 0.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 3, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = ['#220044', '#002244', '#224400'][d];
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 2, 0.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.restore();
  }
}

function drawPizzaTower() {
  const bp = getBurrowPositions();
  const { x, y } = bp.pizza;

  // Stack of pizza boxes
  const boxH = 8;
  const boxW = 35;
  for (let b = 0; b < 6; b++) {
    const bx = x + Math.sin(b * 0.7) * 3;
    const by = y - b * boxH;
    ctx.fillStyle = b === 5 ? '#a08050' : '#856040';
    ctx.strokeStyle = '#5e4a28';
    ctx.lineWidth = 0.5;
    drawRoundRect(bx, by, boxW, boxH, 1);
    ctx.fill();
    ctx.stroke();

    if (b < 5) {
      // Logo on box
      ctx.fillStyle = '#3a2a1a';
      ctx.beginPath();
      ctx.arc(bx + boxW / 2, by + boxH / 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Top box is open
  const topY = y - 5 * boxH;
  ctx.fillStyle = '#8a6a3a';
  ctx.save();
  ctx.translate(x, topY);
  ctx.rotate(-0.15);
  drawRoundRect(0, -boxH, boxW, boxH, 1);
  ctx.fill();
  ctx.strokeStyle = '#4a3a1a';
  ctx.stroke();
  ctx.restore();

  // Pizza inside top box
  ctx.fillStyle = '#cc8833';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 0, Math.PI * 2);
  ctx.fill();
  // Sauce
  ctx.fillStyle = '#aa2222';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 10, 0, Math.PI * 2);
  ctx.fill();
  // Cheese
  ctx.fillStyle = '#ddaa33';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 9, 0, Math.PI * 2);
  ctx.fill();
  // Missing slices (2 gone)
  ctx.fillStyle = '#8a6a3a';
  ctx.beginPath();
  ctx.moveTo(x + boxW / 2, topY + boxH / 2);
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 0.3, 0.9);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + boxW / 2, topY + boxH / 2);
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 2.5, 3.1);
  ctx.closePath();
  ctx.fill();

  // Pepperoni
  ctx.fillStyle = '#882222';
  for (let p = 0; p < 5; p++) {
    const pa = p * 1.2 + 1;
    const pr = 5 + Math.random() * 3;
    ctx.beginPath();
    ctx.arc(x + boxW / 2 + Math.cos(pa) * pr, topY + boxH / 2 + Math.sin(pa) * pr, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Napkins and sauce packets scattered
  ctx.fillStyle = '#eee';
  ctx.save();
  ctx.translate(x + boxW + 8, y - 10);
  ctx.rotate(0.3);
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
  ctx.fillStyle = '#ddd';
  ctx.save();
  ctx.translate(x + boxW + 15, y);
  ctx.rotate(-0.5);
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
  // Sauce packet
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(x - 8, y + 5, 8, 4);
}

function drawFridge() {
  const bp = getBurrowPositions();
  const { x, y, w, h } = bp.fridge;

  // Fridge body
  ctx.fillStyle = '#e8e0d0';
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  drawRoundRect(x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  // Door slightly open - light coming out
  const doorAngle = 0.15;
  ctx.save();
  ctx.translate(x + w, y);
  ctx.rotate(doorAngle);

  // Door
  ctx.fillStyle = '#d8d0c0';
  ctx.strokeStyle = '#999';
  drawRoundRect(-w + 2, 0, w - 2, h, 3);
  ctx.fill();
  ctx.stroke();

  // Handle
  ctx.fillStyle = '#888';
  drawRoundRect(-8, h * 0.35, 3, 20, 1);
  ctx.fill();

  ctx.restore();

  // Light from crack
  ctx.fillStyle = 'rgba(255,255,200,0.1)';
  ctx.beginPath();
  ctx.moveTo(x + w + 2, y + 5);
  ctx.lineTo(x + w + 30, y - 10);
  ctx.lineTo(x + w + 30, y + h + 10);
  ctx.lineTo(x + w + 2, y + h - 5);
  ctx.closePath();
  ctx.fill();

  // Interior glow
  drawGlow(x + w, y + h / 2, 25, '#ffffaa', 0.15);

  // Magnets on door
  const magnets = ['🐀', '🧀', '😂', '🍕'];
  ctx.font = '8px serif';
  for (let m = 0; m < magnets.length; m++) {
    ctx.fillText(magnets[m], x + 8 + (m % 2) * 18, y + 15 + Math.floor(m / 2) * 25);
  }

  // Puddle under fridge
  ctx.fillStyle = '#4488aa20';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h + 8, w * 0.6, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Drip animation
  ambient.dropTimer += deltaTime;
  if (!ambient.dropFalling && ambient.dropTimer > 2) {
    ambient.dropFalling = true;
    ambient.dropY = y + h;
    ambient.dropTimer = 0;
  }
  if (ambient.dropFalling) {
    ambient.dropY += 40 * deltaTime;
    ctx.fillStyle = '#6abbe8';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, ambient.dropY, 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    if (ambient.dropY > y + h + 8) {
      ambient.dropFalling = false;
      // Ripple particle
      spawnParticle(x + w / 2, y + h + 8, 0, 0, 0.5, '#6abbe8', 4, 0);
    }
  }
}

function drawSpiderweb() {
  const bx = W - 60;
  const by = 15;

  // Web
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 0.5;

  // Radials
  const arms = 8;
  const radius = 45;
  for (let a = 0; a < arms; a++) {
    const angle = (a / arms) * Math.PI * 0.7 + Math.PI * 0.8;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(angle) * radius, by + Math.sin(angle) * radius);
    ctx.stroke();
  }

  // Rings
  for (let r = 1; r <= 4; r++) {
    const rr = r * (radius / 4);
    ctx.beginPath();
    for (let a = 0; a <= arms; a++) {
      const angle = (a / arms) * Math.PI * 0.7 + Math.PI * 0.8;
      const px = bx + Math.cos(angle) * rr;
      const py = by + Math.sin(angle) * rr;
      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // Spider
  const spX = bx + Math.cos(ambient.spiderX) * 20;
  const spY = by + 20 + Math.sin(ambient.spiderX * 1.3) * 8;
  ambient.spiderX += deltaTime * 0.2;

  // Body
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(spX, spY, 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(spX, spY - 4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Legs
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  for (let l = 0; l < 4; l++) {
    const la = l * 0.4 + 0.3;
    ctx.beginPath();
    ctx.moveTo(spX, spY);
    ctx.quadraticCurveTo(spX + Math.cos(la) * 6, spY + 3, spX + Math.cos(la) * 8, spY + 6 + l);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(spX, spY);
    ctx.quadraticCurveTo(spX - Math.cos(la) * 6, spY + 3, spX - Math.cos(la) * 8, spY + 6 + l);
    ctx.stroke();
  }
  // Eyes (red dots)
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(spX - 1, spY - 5, 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(spX + 1, spY - 5, 0.5, 0, Math.PI * 2);
  ctx.fill();
}

// STRIPPER POLE 🐭💃
// ============================================================
function drawStripperPole(ctx, x, y, t) {
  ctx.save();
  ctx.translate(x, y);

  // Chrome pole — vertical
  const poleH = 120;
  const poleGrad = ctx.createLinearGradient(-3, -poleH, 3, 0);
  poleGrad.addColorStop(0, '#e0e0e0');
  poleGrad.addColorStop(0.3, '#ffffff');
  poleGrad.addColorStop(0.5, '#b0b0b0');
  poleGrad.addColorStop(0.7, '#ffffff');
  poleGrad.addColorStop(1, '#c0c0c0');
  ctx.fillStyle = poleGrad;
  ctx.fillRect(-3, -poleH, 6, poleH);

  // Pole base
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pole top cap
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.ellipse(0, -poleH, 5, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stage/platform circle
  ctx.strokeStyle = '#ff69b480';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, 2, 25, 8, 0, 0, Math.PI * 2);
  ctx.stroke();

  // === Мышка-стриптизёрша (маленькая!) ===
  const mouseAngle = t * 2.5;
  const mouseR = 14;
  const mx = Math.cos(mouseAngle) * mouseR;
  const my = Math.sin(mouseAngle) * mouseR * 0.4; // squash for perspective
  const mz = -poleH * 0.45 + Math.sin(t * 1.2) * 15; // vertical bob

  ctx.save();
  ctx.translate(mx, mz + my);

  // Тело мышки (маленькое!)
  ctx.fillStyle = '#d0b090';
  ctx.beginPath();
  ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Голова
  ctx.fillStyle = '#d8b898';
  ctx.beginPath();
  ctx.arc(0, -8, 4, 0, Math.PI * 2);
  ctx.fill();

  // Уши (большие, мышиные)
  ctx.fillStyle = '#e8c8a8';
  ctx.beginPath(); ctx.arc(-4, -11, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -11, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffaaaa';
  ctx.beginPath(); ctx.arc(-4, -11, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -11, 1.5, 0, Math.PI * 2); ctx.fill();

  // Глазки
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-1.5, -8, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -8, 0.8, 0, Math.PI * 2); ctx.fill();

  // Розовый бантик 🎀
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath();
  ctx.moveTo(0, -13); ctx.lineTo(-4, -15); ctx.lineTo(0, -14); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -13); ctx.lineTo(4, -15); ctx.lineTo(0, -14); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -13, 1, 0, Math.PI * 2); ctx.fill();

  // Ножки вытянуты
  const legKick = Math.sin(mouseAngle * 2) * 0.3;
  ctx.strokeStyle = '#d0b090';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-2, 6); ctx.lineTo(-5, 12 + Math.sin(legKick) * 3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, 6); ctx.lineTo(5, 12 - Math.sin(legKick) * 3); ctx.stroke();

  // Лапки на шесте (линия к центру)
  ctx.strokeStyle = '#c8a878';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-3, -2); ctx.lineTo(-mx * 0.3, -my * 0.3 - mz * 0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3, -2); ctx.lineTo(-mx * 0.2, -my * 0.2 - mz * 0.05); ctx.stroke();

  // Длинный хвост
  ctx.strokeStyle = '#c89878';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 7);
  ctx.quadraticCurveTo(8 + Math.sin(t * 3) * 5, 14, 12 + Math.cos(t * 2) * 4, 18);
  ctx.stroke();

  ctx.restore();

  // === Неоновая вывеска "MOUSETRAP" ===
  const neonFlicker = 0.7 + Math.sin(t * 8) * 0.15 + Math.sin(t * 13) * 0.1;
  ctx.globalAlpha = neonFlicker;
  ctx.fillStyle = '#ff69b4';
  ctx.font = 'bold 10px "Share Tech Mono"';
  ctx.textAlign = 'center';
  // Glow
  ctx.shadowColor = '#ff69b4';
  ctx.shadowBlur = 12;
  ctx.fillText('MOUSETRAP', 0, -poleH - 12);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // === Монетки от зрителей (падающие) ===
  for (let c = 0; c < 3; c++) {
    const ct = (t * 0.8 + c * 1.3) % 3;
    if (ct < 2) {
      ctx.globalAlpha = Math.max(0, 1 - ct / 2);
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(-18 + c * 18, -20 + ct * 25, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();
}

  ctx.textAlign = 'left';
  ctx.restore();
}

// ============================================================
// SLOT MACHINE 🎰
// ============================================================
let _slotJackpotTimer = 0;
let _slotJackpot = false;

function drawSlotMachine(ctx, x, y, w, h, t) {
  ctx.save();
  ctx.translate(x, y);

  // Корпус — тёмно-красный/gold
  const bodyGrad = ctx.createLinearGradient(0, 0, w, h);
  bodyGrad.addColorStop(0, '#4a0a0a');
  bodyGrad.addColorStop(0.5, '#6a1a1a');
  bodyGrad.addColorStop(1, '#3a0808');
  ctx.fillStyle = bodyGrad;
  drawRoundRect(0, 0, w, h, 5);
  ctx.fill();
  // Gold trim
  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 2;
  drawRoundRect(0, 0, w, h, 5);
  ctx.stroke();

  // Надпись "RAT VEGAS" неоном сверху
  const vegasFlicker = 0.8 + Math.sin(t * 7) * 0.12 + Math.cos(t * 11) * 0.08;
  ctx.globalAlpha = vegasFlicker;
  ctx.fillStyle = '#ffcc00';
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 10;
  ctx.font = 'bold 8px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('RAT VEGAS', w / 2, -5);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // 3 слота
  const symbols = ['🧀', '🐀', '💀', '🍺', '💰'];
  const slotW = (w - 20) / 3;
  ctx.fillStyle = '#111';
  ctx.fillRect(7, 12, w - 14, 24);

  const slotVals = [];
  for (let s = 0; s < 3; s++) {
    const speed = 1.7 + s * 0.6;
    const idx = Math.floor(((Math.sin(t * speed) + 1) / 2) * symbols.length) % symbols.length;
    slotVals.push(idx);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(9 + s * slotW + s * 2, 14, slotW, 20);
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.fillText(symbols[idx], 9 + s * slotW + slotW / 2 + s * 2, 30);
  }

  // Jackpot check
  const allSame = slotVals[0] === slotVals[1] && slotVals[1] === slotVals[2];
  if (allSame && !_slotJackpot) {
    _slotJackpot = true;
    _slotJackpotTimer = t;
  }
  if (_slotJackpot && t - _slotJackpotTimer > 3) {
    _slotJackpot = false;
  }

  if (_slotJackpot) {
    // JACKPOT! text
    const jpFlash = Math.sin(t * 12) > 0 ? '#ffdd00' : '#ff4400';
    ctx.fillStyle = jpFlash;
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 15;
    ctx.font = 'bold 12px "Share Tech Mono"';
    ctx.fillText('JACKPOT!', w / 2, 52);
    ctx.shadowBlur = 0;
    // Golden particles
    for (let p = 0; p < 2; p++) {
      spawnParticle(x + w / 2 + rand(-20, 20), y + 10, rand(-30, 30), rand(-50, -20), 1.2, '#ffdd00', 3, 15, '★');
    }
  }

  // Рычаг сбоку
  const leverPull = Math.sin(t * 0.4);
  const leverAngle = leverPull > 0.7 ? (leverPull - 0.7) * 3 : 0;
  ctx.save();
  ctx.translate(w + 4, 20);
  ctx.rotate(leverAngle * 0.5);
  ctx.fillStyle = '#888';
  ctx.fillRect(-2, 0, 4, 30);
  // Knob
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Coin slot
  ctx.fillStyle = '#333';
  ctx.fillRect(w / 2 - 6, h - 12, 12, 3);
  ctx.fillStyle = '#555';
  ctx.fillRect(w / 2 - 4, h - 11, 8, 1);

  ctx.textAlign = 'left';
  ctx.restore();
}

function drawEnergyVending(ctx, x, y, w, h, t) {

function drawToilet(ctx, x, y, w, h, t) {
  ctx.save();
  ctx.translate(x, y);
  // Door
  ctx.fillStyle = '#5a4030';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, w, h);
  // Handle
  ctx.fillStyle = '#ccaa44';
  ctx.beginPath(); ctx.arc(w - 8, h / 2, 3, 0, Math.PI * 2); ctx.fill();
  // Sign: "СЕРВЕРНАЯ" crossed out
  ctx.fillStyle = '#ddd';
  ctx.fillRect(w / 2 - 18, 8, 36, 18);
  ctx.fillStyle = '#333';
  ctx.font = '4px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('СЕРВЕРНАЯ', w / 2, 18);
  // Strikethrough
  ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(w / 2 - 16, 16); ctx.lineTo(w / 2 + 16, 16); ctx.stroke();
  // "ТУАЛЕТ" below
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 5px "Share Tech Mono"';
  ctx.fillText('ТУАЛЕТ', w / 2, 26);
  // Red indicator "ЗАНЯТО" — blinks
  const blinkOn = Math.sin(t * 4) > 0;
  ctx.fillStyle = blinkOn ? '#ff0000' : '#440000';
  ctx.beginPath(); ctx.arc(w / 2, 34, 4, 0, Math.PI * 2); ctx.fill();
  if (blinkOn) {
    ctx.fillStyle = '#ff0000';
    ctx.font = '3px "Share Tech Mono"';
    ctx.fillText('ЗАНЯТО', w / 2, 42);
  }
  // Smoke/steam from under door
  for (let s = 0; s < 4; s++) {
    const st = (t * 0.5 + s * 0.6) % 2.5;
    const sx = w * 0.2 + s * w * 0.2;
    ctx.globalAlpha = Math.max(0, 0.4 - st * 0.16);
    ctx.fillStyle = '#aaaaaa';
    ctx.beginPath();
    ctx.arc(sx, h + 2 - st * 12, 3 + st * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Stink stars
  const stinkAlpha = 0.3 + Math.sin(t * 2) * 0.2;
  ctx.globalAlpha = stinkAlpha;
  ctx.fillStyle = '#aaff44';
  ctx.font = '8px "Share Tech Mono"';
  ctx.fillText('*  *  *', w / 2, -5);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawPunchingBag(ctx, x, y, t) {
  ctx.save();
  ctx.translate(x, y);
  // Chain
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(0, -25); ctx.stroke();
  // Chain links
  for (let i = 0; i < 4; i++) {
    ctx.strokeStyle = '#999';
    ctx.beginPath();
    ctx.ellipse(0, -48 + i * 7, 2, 3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Bag — swings
  const swing = Math.sin(t * 2) * 0.15;
  ctx.save();
  ctx.rotate(swing);
  ctx.fillStyle = '#882222';
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#661111'; ctx.lineWidth = 1; ctx.stroke();
  // Stitching
  ctx.strokeStyle = '#aa4444'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(0, 22); ctx.stroke();
  // "DEADLINE" text
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 4px "Share Tech Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('DEAD', 0, -3);
  ctx.fillText('LINE', 0, 4);
  ctx.restore();
  // Dust particles when swinging
  if (Math.abs(Math.sin(t * 2)) > 0.7) {
    const side = Math.sin(t * 2) > 0 ? 1 : -1;
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ccaa88';
    for (let p = 0; p < 2; p++) {
      ctx.beginPath();
      ctx.arc(side * 16 + rand(-3, 3), rand(-5, 5), 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawHammock(ctx, x, y, w, t) {
  ctx.save();
  ctx.translate(x, y);
  const halfW = w / 2;
  // Pipes
  ctx.fillStyle = '#777';
  ctx.fillRect(-halfW - 3, -40, 6, 65);
  ctx.fillRect(halfW - 3, -40, 6, 65);
  // Hammock (bezier curve)
  const sag = 8 + Math.sin(t * 0.5) * 2;
  ctx.strokeStyle = '#44aa44'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-halfW, -8);
  ctx.bezierCurveTo(-halfW * 0.3, sag + 10, halfW * 0.3, sag + 10, halfW, -8);
  ctx.stroke();
  // Hammock fill
  ctx.fillStyle = '#44aa4430';
  ctx.beginPath();
  ctx.moveTo(-halfW, -8);
  ctx.bezierCurveTo(-halfW * 0.3, sag + 10, halfW * 0.3, sag + 10, halfW, -8);
  ctx.lineTo(halfW, -5);
  ctx.bezierCurveTo(halfW * 0.3, sag + 13, -halfW * 0.3, sag + 13, -halfW, -5);
  ctx.closePath();
  ctx.fill();
  // Netting lines
  ctx.strokeStyle = '#44aa4450'; ctx.lineWidth = 0.5;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(i * halfW / 4, -6 + Math.abs(i) * 1);
    ctx.lineTo(i * halfW / 4, sag + 6 - Math.abs(i) * 1);
    ctx.stroke();
  }
  // Sleeping rat (small)
  ctx.fillStyle = '#c8a070';
  ctx.beginPath(); ctx.ellipse(0, sag + 2, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#b09060';
  ctx.beginPath(); ctx.arc(-7, sag, 3, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.fillStyle = '#ddb090';
  ctx.beginPath(); ctx.ellipse(-9, sag - 3, 2, 3, -0.3, 0, Math.PI * 2); ctx.fill();
  // ZZZ
  for (let z = 0; z < 3; z++) {
    const zt = (t * 0.4 + z * 0.8) % 2.5;
    ctx.globalAlpha = Math.max(0, 1 - zt / 2.5);
    ctx.fillStyle = '#aabbff';
    ctx.font = `${5 + z * 2}px "Share Tech Mono"`;
    ctx.textAlign = 'center';
    ctx.fillText('Z', 10 + z * 4, sag - 6 - zt * 8);
  }
  ctx.globalAlpha = 1;
  // Sign
  ctx.fillStyle = '#ffcc44';
  ctx.font = '3.5px "Share Tech Mono"';
  ctx.fillText('DO NOT DISTURB (LOL)', 0, 24);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawNeonSign(ctx, x, y, w, t) {
  ctx.save();
  ctx.translate(x, y);
  const text = 'HOME SWEET SEWER';
  // Wires
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w, 0); ctx.lineTo(w, -12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w * 0.3, 0); ctx.lineTo(w * 0.3, -8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w * 0.7, 0); ctx.lineTo(w * 0.7, -8); ctx.stroke();
  // Background bar
  ctx.fillStyle = '#111';
  ctx.fillRect(-3, 0, w + 6, 14);
  // Neon text — letter by letter with one flickering
  const flickerIdx = Math.floor((t * 0.3) % text.length);
  ctx.font = 'bold 7px "Share Tech Mono"';
  ctx.textAlign = 'center';
  const letterW = w / text.length;
  for (let i = 0; i < text.length; i++) {
    let alpha = 1;
    if (i === flickerIdx) {
      alpha = 0.2 + Math.sin(t * 12) * 0.4;
    }
    ctx.globalAlpha = Math.max(0.1, alpha);
    // Alternate green/pink
    ctx.fillStyle = i % 2 === 0 ? '#00ff88' : '#ff44aa';
    // Glow
    ctx.shadowColor = i % 2 === 0 ? '#00ff88' : '#ff44aa';
    ctx.shadowBlur = 6;
    ctx.fillText(text[i], letterW * i + letterW / 2, 10);
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.restore();
}

  // Second spider web in other corner
  ctx.save();

  const wy = 10;
  for (let a = 0; a < 5; a++) {
    const angle = a * 0.35 + 0.3;
    ctx.beginPath();
    ctx.moveTo(wx, wy);
    ctx.lineTo(wx + Math.cos(angle) * 30, wy + Math.sin(angle) * 30);

    ctx.beginPath();

      const angle = a * 0.35 + 0.3;

      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
// RAT DRAWING (per agent unique visuals)
// ============================================================
const RAT_SCALE = 1.45; // global rat size multiplier — makes rats visible characters

function drawRat(agent, x, y, facing, scale) {
  const s = (scale || 1) * RAT_SCALE;
  const f = facing || 1; // 1=right, -1=left
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(f * s, s);

  const def = agent.def;
  const id = def.id;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 18, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // BODY — each rat has unique outfit
  drawRatBody(id, def);

  // HEAD
  drawRatHead(id, def, agent);

  // ACCESSORIES per agent
  drawRatAccessories(id, def);

  ctx.restore();
}

      });
      break;

    case 'zamokrys': // Dark tactical
      ctx.fillStyle = '#1a1a1a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Tactical vest
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-9, -2, 18, 15);
      // Pouches
      ctx.fillStyle = '#333';
      ctx.fillRect(-9, 5, 5, 4);
      ctx.fillRect(4, 5, 5, 4);
      ctx.fillRect(-9, 10, 5, 3);
      // USB flash drives on belt
      ctx.fillStyle = '#444';
      ctx.fillRect(-3, 14, 3, 5);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-2, 15, 1, 1);
      ctx.fillStyle = '#444';
      ctx.fillRect(1, 14, 3, 5);
      break;

    case 'nornik': // Orange overalls
      ctx.fillStyle = '#cc6600';
      drawRoundRect(-10, -5, 20, 23, 5);
      ctx.fill();
      // Straps
      ctx.fillStyle = '#aa5500';
      ctx.fillRect(-6, -5, 3, 12);
      ctx.fillRect(3, -5, 3, 12);
      // Tool belt
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-10, 10, 20, 4);
      // Wrench
      ctx.fillStyle = '#aaa';
      ctx.fillRect(8, 8, 2, 8);
      ctx.fillRect(7, 6, 4, 3);
      break;

    case 'syrolog': // Striped blazer
      ctx.fillStyle = '#2a2a4a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Stripes
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      for (let s = 0; s < 5; s++) {
        ctx.beginPath();
        ctx.moveTo(-8 + s * 4, -3);
        ctx.lineTo(-8 + s * 4, 16);
        ctx.stroke();
      }
      // Gold chain
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-4, -3);
      ctx.quadraticCurveTo(0, 5, 4, -3);
      ctx.stroke();
      // 🧀 pendant
      ctx.fillStyle = '#ddaa22';
      ctx.beginPath();
      ctx.arc(0, 3, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'arhivary': // Cardigan with diamond pattern
      ctx.fillStyle = '#5a4a4a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Diamond pattern
      ctx.strokeStyle = '#6a5a5a';
      ctx.lineWidth = 0.5;
      for (let dy = 0; dy < 4; dy++) {
        for (let dx = 0; dx < 3; dx++) {
          const cx = -6 + dx * 6;
          const cy = 1 + dy * 5;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 2);
          ctx.lineTo(cx + 2, cy);
          ctx.lineTo(cx, cy + 2);
          ctx.lineTo(cx - 2, cy);
          ctx.closePath();
          ctx.stroke();
        }
      }
      break;

    case 'planogriz': // Dress shirt + tie
      ctx.fillStyle = '#e8e8ff';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Tie
      ctx.fillStyle = '#2244aa';
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.lineTo(2, 4);
      ctx.lineTo(0, 14);
      ctx.lineTo(-2, 4);
      ctx.closePath();
      ctx.fill();
      // Watch on wrist
      ctx.fillStyle = '#333';
      ctx.fillRect(-13, 11, 4, 3);
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(-12, 11.5, 2, 2);
      break;

    default: // Generic body for stage 2 agents
      ctx.fillStyle = '#777';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
  }

  // Legs (simple)
  ctx.fillStyle = '#666';
  ctx.fillRect(-6, 16, 4, 6);
  ctx.fillRect(2, 16, 4, 6);
  // Feet
  ctx.fillStyle = '#555';
  ctx.fillRect(-7, 21, 6, 2);
  ctx.fillRect(1, 21, 6, 2);
}

function drawRatHead(id, def, agent) {
  const t = frameCount * 0.001;

  // Base head
  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.ellipse(0, -14, 9, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#aa9999';
  ctx.beginPath();
  ctx.ellipse(8, -12, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#ff8888';
  ctx.beginPath();
  ctx.arc(12, -12, 2, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#bb9999';
  ctx.beginPath();
  ctx.ellipse(-4, -22, 5, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffaaaa';
  ctx.beginPath();
  ctx.ellipse(-4, -22, 3, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#bb9999';
  ctx.beginPath();
  ctx.ellipse(4, -22, 5, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffaaaa';
  ctx.beginPath();
  ctx.ellipse(4, -22, 3, 5, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (unique color per agent)
  const eyeColor = def.eyes;
  const blinkPhase = Math.sin(t * 3 + agent.blinkOffset);
  const eyeH = blinkPhase > 0.95 ? 0.5 : 2.5;

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(2, -15, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -14, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.ellipse(2, -15, 1.5, eyeH, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -14, 1.2, eyeH * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye glow
  drawGlow(2, -15, 6, eyeColor, 0.15);

  // Whiskers
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 0.5;
  for (let w = 0; w < 3; w++) {
    const wy = -13 + w * 2;
    // Right whiskers
    ctx.beginPath();
    ctx.moveTo(11, wy);
    ctx.lineTo(20, wy - 2 + w * 2 + Math.sin(t * 2 + w) * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(11, wy);
    ctx.lineTo(20, wy + 1 + Math.sin(t * 2 + w + 1) * 0.5);
    ctx.stroke();
    // Left whiskers
    ctx.beginPath();
    ctx.moveTo(-11, wy);
    ctx.lineTo(-20, wy - 2 + w * 2 + Math.sin(t * 2 + w) * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-11, wy);
    ctx.lineTo(-20, wy + 1 + Math.sin(t * 2 + w + 1) * 0.5);
    ctx.stroke();
  }

  // Tail
  ctx.strokeStyle = '#aa8888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, 10);
  ctx.bezierCurveTo(-18, 5, -22, 15 + Math.sin(t * 2) * 3, -28, 8 + Math.sin(t * 1.5) * 5);
  ctx.stroke();

  // Per-agent head accessories
  switch (id) {
    case 'shnyr':
      // Monocle (glowing)
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(8, -14, 4, 0, Math.PI * 2);
      ctx.stroke();
      drawGlow(8, -14, 8, '#FFD700', 0.2);
      // Monocle chain
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(4, -14);
      ctx.quadraticCurveTo(0, -8, -2, -3);
      ctx.stroke();
      break;

    case 'nyuhach':
      // Long nose (extended snout)
      ctx.fillStyle = '#aa9999';
      ctx.beginPath();
      ctx.ellipse(14, -12, 4, 3, 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Nose tip more forward
      ctx.fillStyle = '#ff8888';
      ctx.beginPath();
      ctx.arc(17, -12, 2.5, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'arhinor':
      // Blue hard hat with ARCH
      ctx.fillStyle = '#2244aa';
      ctx.beginPath();
      ctx.ellipse(0, -20, 11, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(-11, -20, 22, 3);
      // Brim
      ctx.fillStyle = '#1a3388';
      ctx.fillRect(-13, -18, 26, 3);
      // ARCH text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 4px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('ARCH', 0, -20);
      ctx.textAlign = 'left';
      // Pencil behind ear
      ctx.fillStyle = '#ddcc00';
      ctx.save();
      ctx.translate(6, -22);
      ctx.rotate(0.5);
      ctx.fillRect(-1, -6, 2, 10);
      ctx.fillStyle = '#ff8866';
      ctx.fillRect(-1, -6, 2, 2);
      ctx.restore();
      break;

    case 'kodogryz':
      // Matrix-style eye override (green digital rain in eyes)
      ctx.fillStyle = '#00ff88';
      ctx.font = '3px monospace';
      const digit1 = Math.floor(frameCount / 10) % 2;
      const digit2 = (Math.floor(frameCount / 10) + 1) % 2;
      ctx.fillText(digit1.toString(), 1, -14);
      ctx.fillText(digit2.toString(), 7, -13);
      // Tooth (prominent)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(9, -10);
      ctx.lineTo(10, -7);
      ctx.lineTo(8, -7);
      ctx.closePath();
      ctx.fill();
      break;

    case 'piskel':
      // Pink beret
      ctx.fillStyle = '#ff44cc';
      ctx.beginPath();
      ctx.ellipse(0, -22, 10, 4, -0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, -22, 8, Math.PI, 0, true);
      ctx.fill();
      // Beret knob
      ctx.fillStyle = '#ff66dd';
      ctx.beginPath();
      ctx.arc(-2, -26, 2, 0, Math.PI * 2);
      ctx.fill();
      // Headphones
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -16, 10, Math.PI * 0.8, Math.PI * 0.2, true);
      ctx.stroke();
      ctx.fillStyle = '#444';
      ctx.fillRect(-11, -18, 4, 6);
      ctx.fillRect(7, -18, 4, 6);
      break;

    case 'shurshik':
      // Lab goggles
      ctx.fillStyle = '#ddd';
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      // Left goggle
      ctx.beginPath();
      ctx.ellipse(1, -15, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Right goggle
      ctx.beginPath();
      ctx.ellipse(9, -14, 4, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Strap
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-4, -15);
      ctx.lineTo(-7, -16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(13, -14);
      ctx.lineTo(16, -15);
      ctx.stroke();
      // Green tint in lenses
      ctx.fillStyle = '#88ff8830';
      ctx.beginPath();
      ctx.ellipse(1, -15, 3.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(9, -14, 2.5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Grumpy mouth
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(8, -9, 4, 0.2, Math.PI - 0.2, true);
      ctx.stroke();
      break;

    case 'zamokrys':
      // Balaclava with ears poking through
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(0, -14, 10, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye holes
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(2, -15, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8, -14, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Re-draw eyes over balaclava
      ctx.fillStyle = def.eyes;
      ctx.beginPath();
      ctx.ellipse(2, -15, 1.5, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8, -14, 1.2, 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
      drawGlow(2, -15, 6, def.eyes, 0.2);
      // Lock pendant
      ctx.fillStyle = '#888';
      ctx.fillRect(-2, -4, 4, 5);
      ctx.beginPath();
      ctx.arc(0, -4, 3, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(0, -1, 1, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'nornik':
      // Orange hard hat
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.ellipse(0, -20, 11, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(-11, -20, 22, 3);
      ctx.fillStyle = '#dd7700';
      ctx.fillRect(-13, -18, 26, 3);
      // Headlamp
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(10, -19, 3, 0, Math.PI * 2);
      ctx.fill();
      drawGlow(10, -19, 8, '#ffff00', 0.2);
      break;

    case 'syrolog':
      // Bowler hat
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(0, -22, 10, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, -24, 7, 5, 0, Math.PI, 0);
      ctx.fill();
      // Wide smile
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(7, -10, 5, 0, Math.PI * 0.8);
      ctx.stroke();
      // Gold tooth
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(6, -9, 2, 2);
      break;

    case 'arhivary':
      // Huge round glasses
      ctx.strokeStyle = '#6688aa';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(2, -15, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(9, -14, 4.5, 0, Math.PI * 2);
      ctx.stroke();
      // Bridge
      ctx.beginPath();
      ctx.moveTo(7, -15);
      ctx.lineTo(4.5, -14.5);
      ctx.stroke();
      // Lens shine
      ctx.fillStyle = '#ffffff20';
      ctx.beginPath();
      ctx.arc(1, -16, 2, 0, Math.PI * 2);
      ctx.fill();
      // Braid/ponytail
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6, -14);
      ctx.bezierCurveTo(-10, -10, -12, -5, -10, 0);
      ctx.stroke();
      // Hair tie
      ctx.fillStyle = '#ff4488';
      ctx.beginPath();
      ctx.arc(-10, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'planogriz':
      // Slicked-back hair
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.moveTo(-8, -18);
      ctx.quadraticCurveTo(0, -25, 8, -18);
      ctx.quadraticCurveTo(5, -16, -5, -16);
      ctx.closePath();
      ctx.fill();
      // Wristwatch (repeat from body but more visible)
      break;

    default:
      break;
  }
}

function drawRatAccessories(id, def) {
  switch (id) {
    case 'shnyr':
      // Pointer stick
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(12, 5);
      ctx.lineTo(28, -8);
      ctx.stroke();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(28, -8, 2, 0, Math.PI * 2);
      ctx.fill();
      // Folder
      ctx.fillStyle = '#ddaa44';
      ctx.fillRect(-16, 5, 8, 12);
      ctx.fillStyle = '#cc9933';
      ctx.fillRect(-16, 5, 8, 2);
      break;

    case 'nyuhach':
      // Giant magnifying glass
      ctx.strokeStyle = '#aa8844';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(18, -8, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Glass fill
      ctx.fillStyle = '#88ccff15';
      ctx.beginPath();
      ctx.arc(18, -8, 7, 0, Math.PI * 2);
      ctx.fill();
      // Handle
      ctx.strokeStyle = '#664422';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(12, -2);
      ctx.lineTo(6, 8);
      ctx.stroke();
      // Tags
      ctx.fillStyle = '#ff444480';
      ctx.font = '4px "Share Tech Mono"';
      ctx.fillText('NPM', -15, -2);
      ctx.fillStyle = '#44ff8880';
      ctx.fillText('GH', -15, 5);
      ctx.fillStyle = '#f48024cc';
      ctx.fillText('SO', -15, 12);
      break;

    case 'arhinor':
      // Blueprint/scroll
      ctx.fillStyle = '#4488cc';
      ctx.fillRect(-16, 3, 12, 16);
      ctx.fillStyle = '#ffffff20';
      // Blueprint grid
      ctx.strokeStyle = '#ffffff15';
      ctx.lineWidth = 0.3;
      for (let g = 0; g < 5; g++) {
        ctx.beginPath();
        ctx.moveTo(-15, 5 + g * 3);
        ctx.lineTo(-5, 5 + g * 3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-14 + g * 2.5, 4);
        ctx.lineTo(-14 + g * 2.5, 18);
        ctx.stroke();
      }
      break;

    case 'kodogryz':
      // Laptop with circuit board texture
      ctx.fillStyle = '#1a2a1a';
      ctx.strokeStyle = '#00ff8830';
      ctx.lineWidth = 0.5;
      ctx.fillRect(10, 5, 16, 10);
      ctx.strokeRect(10, 5, 16, 10);
      // Circuit traces
      ctx.strokeStyle = '#00ff8840';
      ctx.beginPath();
      ctx.moveTo(12, 8);
      ctx.lineTo(16, 8);
      ctx.lineTo(16, 12);
      ctx.lineTo(22, 12);
      ctx.stroke();
      // Screen glow
      ctx.fillStyle = '#00ff8815';
      ctx.fillRect(11, 6, 14, 8);
      // USB flash
      ctx.fillStyle = '#444';
      ctx.fillRect(-16, 8, 4, 6);
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(-15, 10, 2, 1);
      break;

    case 'piskel':
      // Stylus
      ctx.fillStyle = '#666';
      ctx.save();
      ctx.translate(14, 2);
      ctx.rotate(-0.5);
      ctx.fillRect(-1, -8, 2, 16);
      ctx.fillStyle = '#ff44cc';
      ctx.fillRect(-1.5, 6, 3, 3);
      ctx.restore();
      // Tablet on chain
      ctx.fillStyle = '#333';
      drawRoundRect(-18, 3, 10, 14, 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.fillRect(-17, 4, 8, 10);
      // Wireframe on tablet
      ctx.strokeStyle = '#ff44cc40';
      ctx.lineWidth = 0.3;
      ctx.strokeRect(-16, 5, 6, 4);
      ctx.strokeRect(-14, 10, 4, 3);
      // "PIXEL PERFECT" text nearby (floating, swings via sin)
      { const ppT = performance.now() / 1000;
        const ppSwing = Math.sin(ppT * 1.8) * 4;
        ctx.save();
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ff88dd';
        ctx.font = 'bold 3.5px "Share Tech Mono"';
        ctx.textAlign = 'center';
        ctx.fillText('PIXEL PERFECT', 22 + ppSwing, -28);
        ctx.globalAlpha = 1;
        ctx.restore();
      }
      break;

    case 'shurshik':
      // Clipboard
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(-18, 2, 10, 14);
      ctx.fillStyle = '#eee';
      ctx.fillRect(-17, 4, 8, 11);
      // BUG/FAIL/ERROR text
      ctx.fillStyle = '#ff2244';
      ctx.font = '3px "Share Tech Mono"';
      ctx.fillText('BUG', -16, 7);
      ctx.fillStyle = '#ffaa00';
      ctx.fillText('FAIL', -16, 11);
      ctx.fillStyle = '#ff6600';
      ctx.fillText('ERROR', -16, 15);
      // Clip
      ctx.fillStyle = '#aaa';
      ctx.fillRect(-15, 1, 6, 3);
      break;

    case 'zamokrys':
      // Key
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(16, 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(16, 3, 8, 2);
      ctx.fillRect(22, 3, 2, 4);
      ctx.fillRect(20, 3, 2, 3);
      // OWASP badge
      ctx.fillStyle = '#ff2244';
      ctx.beginPath();
      ctx.arc(-16, -2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 4px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('O', -16, -1);
      ctx.textAlign = 'left';
      // Flash drives clipped to vest
      ctx.fillStyle = '#222';
      ctx.fillRect(-20, 6, 5, 4);
      ctx.fillStyle = '#00aaff';
      ctx.fillRect(-19, 7, 1.5, 1.5);
      ctx.fillStyle = '#222';
      ctx.fillRect(-20, 12, 5, 4);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-19, 13, 1.5, 1.5);
      // Lock symbol hanging
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(18, -2, 3, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = '#888';
      ctx.fillRect(15, -2, 6, 5);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(18, 0, 1.2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'nornik':
      // Wrench
      ctx.fillStyle = '#aaa';
      ctx.save();
      ctx.translate(15, 0);
      ctx.rotate(-0.3);
      // Handle
      ctx.fillRect(-2, -8, 4, 16);
      // Open end
      ctx.fillStyle = '#999';
      ctx.fillRect(-5, -10, 10, 4);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(-4, -8, 3, 3);
      ctx.fillRect(1, -8, 3, 3);
      // Closed end
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.arc(0, 8, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(0, 8, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Docker whale mascot icon
      ctx.fillStyle = '#0db7ed';
      ctx.save();
      ctx.translate(-16, -4);
      // Whale body
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(6, -2);
      ctx.lineTo(11, -6);
      ctx.lineTo(11, -1);
      ctx.closePath();
      ctx.fill();
      // Containers on whale's back

];

let demoStatusTimer = 0;
let demoIdleTimer   = 0;
let demoTokenTimer  = 0;
let demoPacketTimer = 0;
let demoPacketInterval = rand(3, 5);

function initDemoMode() {
  const statuses = ['working', 'working', 'running', 'idle', 'sleeping', 'error',
                    'idle', 'working', 'idle', 'sleeping', 'idle'];
  agents.forEach((agent, idx) => {
    agent.status = statuses[idx % statuses.length];
    agent.task   = pick(SAMPLE_TASKS);
    const inBurrow = ['idle','done','sleeping','reserve','dead'].includes(agent.status);
    const pos = inBurrow ? getBurrowIdlePos(idx) : getOfficePos(agent.deskIdx);
    agent.x = pos.x; agent.y = pos.y;
    agent.targetX = pos.x; agent.targetY = pos.y;
    agent.idleActivity = (inBurrow && agent.status !== 'sleeping') ? randInt(0, 16) : -1;
    if (agent.status === 'error') {
      agent.needsDoctor = true;
      agent.doctorTimer = rand(5, 10);
    }
  });
}

function updateDemoMode(dt) {
  demoStatusTimer += dt;
  demoIdleTimer   += dt;
  demoTokenTimer  += dt;
  tickerAddTimer  += dt;
  demoPacketTimer += dt;

  // Every 4s: one random agent changes status
  if (demoStatusTimer >= 4) {
    demoStatusTimer = 0;
    const idx = randInt(0, agents.length - 1);
    const agent = agents[idx];
    const nextStatus = pick(['working','running','idle','sleeping','done']);
    const prevStatus = agent.status;
    agent.status = nextStatus;
    agent.task   = pick(SAMPLE_TASKS);
    agent.updated_at = Date.now();
    // Spawn packet from Шнырь when agent starts working
    if (nextStatus === 'working' && agent.def.id !== 'shnyr') {
      spawnPacket('shnyr', agent.def.id, pick(PACKET_TASK_TYPES));
    }
    // Wake-up bounce когда просыпается
    if (prevStatus === 'sleeping' && nextStatus !== 'sleeping') {
      agent.wakeUpBounceStart = performance.now() / 1000;
    }
    const inBurrow = ['idle','done','sleeping'].includes(nextStatus);
    if (inBurrow) {
      const pos = getBurrowIdlePos(idx);
      agent.targetX = pos.x; agent.targetY = pos.y;
      agent.idleActivity = (nextStatus !== 'sleeping') ? randInt(0, 16) : -1;
      agent.idleTimer = 0;
    } else {
      const pos = getOfficePos(agent.deskIdx);
      agent.targetX = pos.x; agent.targetY = pos.y;
      agent.idleActivity = -1;
    }
    // Random error chance
    if (Math.random() < 0.07) {
      agent.status = 'error';
      agent.needsDoctor = true;
      agent.doctorTimer = rand(5, 10);
      spawnParticle(agent.x, agent.y - 20, rand(-30, 30), rand(-50, -20), 2.5, '#ff2244', 8, 10, 'ERROR 500');
      spawnParticle(agent.x, agent.y - 20, rand(-30, 30), rand(-50, -20), 2.5, '#ffaa00', 8, 10, 'SEGFAULT');
    }
    // Random dead chance
    if (Math.random() < 0.02) {
      agent.status = 'dead';
      if (!ambulance.active) triggerAmbulance(idx);
    }
  }

  // Every 15s: idle agents get new activity
  if (demoIdleTimer >= 15) {
    demoIdleTimer = 0;
    agents.forEach(agent => {
      if (agent.status === 'idle' || agent.status === 'done') {
        agent.idleActivity = randInt(0, 16);
        agent.idleTimer = 0;
        agent.idleAnimT = 0;
      }
    });
  }

  // Every 30s: token drift
  if (demoTokenTimer >= 30) {
    demoTokenTimer = 0;
    agents.forEach(agent => {
      const delta = rand(0.01, 0.04) * agent.tokens_limit;
      agent.tokens_used = clamp(agent.tokens_used + delta, 0, agent.tokens_limit);
      agent.uptime_seconds += 30;
      if (Math.random() > 0.6) agent.commits++;
    });
    Object.keys(providerTokens).forEach(p => {
      providerTokens[p].used = clamp(providerTokens[p].used + rand(-0.03, 0.06), 0.05, 0.99);
    });
  }

  // Ticker refresh every 9s
  if (tickerAddTimer >= 9) {
    tickerAddTimer = 0;
    const msg = pick(TICKER_POOL);
    tickerText += '  ◆  ' + msg;
    if (tickerText.length > 800) tickerText = tickerText.slice(300);
  }

  // Move agents toward targets
  agents.forEach(agent => {
    const dx = agent.targetX - agent.x;
    const dy = agent.targetY - agent.y;
    const d  = Math.hypot(dx, dy);
    if (d < 2) {
      // Snap to target — eliminates sub-pixel jitter
      agent.x = agent.targetX;
      agent.y = agent.targetY;
    } else {
      const speed = agent.status === 'running' ? 180 : 90;
      agent.x += (dx / d) * speed * dt;
      agent.y += (dy / d) * speed * dt;
      agent.facing = dx > 0 ? 1 : -1;
    }
    agent.idleAnimT += dt;
    agent.uptime_seconds += dt;
  });

  // Doctor trigger
  agents.forEach((agent, idx) => {
    if (agent.needsDoctor) {
      agent.doctorTimer -= dt;
      if (agent.doctorTimer <= 0 && !doctor.active) {
        triggerDoctor(idx);
        agent.needsDoctor = false;
      }
    }
  });

  // Random flying packets every 3-5 seconds
  if (demoPacketTimer >= demoPacketInterval) {
    demoPacketTimer = 0;
    demoPacketInterval = rand(3, 5);
    const fromIdx = randInt(0, agents.length - 1);
    let toIdx = randInt(0, agents.length - 2);
    if (toIdx >= fromIdx) toIdx++;
    spawnPacket(agents[fromIdx].def.id, agents[toIdx].def.id, pick(PACKET_TASK_TYPES));
  }

  // Easter egg timer
  cheeseClickTimer = Math.max(0, cheeseClickTimer - dt);
  if (cheeseClickTimer === 0) cheeseClicks = 0;
  if (easterEggActive) {
    easterEggTimer -= dt;
    agents.forEach(a => { a.danceT += dt; });
    if (easterEggTimer <= 0) {
      easterEggActive = false;
      agents.forEach(a => { a.isDancing = false; });
    }
  }
}
