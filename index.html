function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }
function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawGlow(x, y, radius, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
  g.addColorStop(0, color + hex(alpha));
  g.addColorStop(1, color + '00');
  ctx.fillStyle = g;
  ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
}

function hex(a) {
  return Math.round(clamp(a, 0, 1) * 255).toString(16).padStart(2, '0');
}

function drawText(text, x, y, size, color, font, align) {
  ctx.font = `${size}px ${font || "'Share Tech Mono', monospace"}`;
  ctx.fillStyle = color || '#fff';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawTextGlow(text, x, y, size, color, font, align) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  drawText(text, x, y, size, color, font, align);
  ctx.restore();
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
class Particle {
  constructor(x, y, vx, vy, life, color, size, gravity, text) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.color = color;
    this.size = size || 3; this.gravity = gravity || 0; this.text = text || null;
    this.alpha = 1;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += this.gravity * dt;
    this.life -= dt;
    this.alpha = clamp(this.life / this.maxLife, 0, 1);
    return this.life > 0;
  }
  draw() {
    ctx.globalAlpha = this.alpha;
    if (this.text) {
      drawText(this.text, this.x, this.y, this.size, this.color, null, 'center');
    } else {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

const particles = [];
function spawnParticle(x, y, vx, vy, life, color, size, gravity, text) {
  if (particles.length < 500) {
    particles.push(new Particle(x, y, vx, vy, life, color, size, gravity, text));
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update(dt)) particles.splice(i, 1);
  }
}
function drawParticles() {
  particles.forEach(p => p.draw());
}

// ============================================================
// FLOATING TEXT
// ============================================================
const floatingTexts = [];
function addFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 12, life: 2, maxLife: 2 });
}
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 30 * dt;
    ft.life -= dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.globalAlpha = clamp(ft.life / ft.maxLife, 0, 1);
    drawText(ft.text, ft.x, ft.y, ft.size, ft.color, null, 'center');
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// SCANLINES CRT OVERLAY
// ============================================================
function drawScanlines() {
  ctx.save();
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, y, W, 1);
  }
  // Vignette
  const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

  ctx.fillStyle = burGrad;
  ctx.fillRect(SPLIT_X, 0, W - SPLIT_X, H);
}

// ============================================================
// WALL HOLE (border between zones)
// ============================================================
function drawWallHole() {
  const cx = SPLIT_X;
  const holeY = H * 0.35;
  const holeH = H * 0.3;
  const holeW = 40;

  // Wall strip
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(cx - 8, 0, 16, H);

  // Hole shape
  ctx.save();
  ctx.beginPath();
  // Jagged edges
  const pts = [];
  const steps = 20;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const y = holeY + t * holeH;
    const jag = Math.sin(t * 15) * 8 + Math.sin(t * 7.3) * 5;
    pts.push({ lx: cx - holeW / 2 + jag, rx: cx + holeW / 2 - jag, y });
  }
  ctx.moveTo(pts[0].lx, pts[0].y);
  for (let i = 1; i <= steps; i++) ctx.lineTo(pts[i].lx, pts[i].y);
  for (let i = steps; i >= 0; i--) ctx.lineTo(pts[i].rx, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = '#000';
  ctx.fill();

  // Cracks radiating from hole
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const py = holeY + Math.random() * holeH;
    const dir = Math.random() > 0.5 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(cx + dir * holeW / 2, py);
    let dx = dir * holeW / 2;
    let dy = 0;
    for (let j = 0; j < 4; j++) {
      dx += dir * rand(5, 20);
      dy += rand(-10, 10);
      ctx.lineTo(cx + dx, py + dy);
    }
    ctx.stroke();
  }

  // Brick edges
  ctx.fillStyle = '#2a1a1a';
  for (let i = 0; i < 6; i++) {
    const by = holeY + i * holeH / 6 + rand(-3, 3);
    const side = i % 2 === 0 ? -1 : 1;
    const bx = cx + side * (holeW / 2 - 5) + rand(-3, 3);
    ctx.fillRect(bx - 8, by - 4, 16, 8);
    ctx.strokeStyle = '#1a0a0a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(bx - 8, by - 4, 16, 8);
  }

  ctx.restore();
}

function drawOfficeFloor() {
  // Floor line
  ctx.strokeStyle = '#0a1528';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.88);
  ctx.lineTo(SPLIT_X, H * 0.88);
  ctx.stroke();

  // Grid pattern on floor
  ctx.strokeStyle = 'rgba(0,100,200,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < SPLIT_X; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, H * 0.88); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = H * 0.88; y < H; y += 20) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SPLIT_X, y); ctx.stroke();
  }
}

function drawCeiling() {
  const tileW = SPLIT_X / 8;
  const tileH = 30;
  // Ceiling tiles
  for (let i = 0; i < 8; i++) {
    const tx = i * tileW;
    ctx.fillStyle = i === 3 ? 'transparent' : '#0a1020';
    ctx.strokeStyle = '#0d1528';
    ctx.lineWidth = 1;
    if (i !== 3) {
      ctx.fillRect(tx, 0, tileW - 2, tileH);
      ctx.strokeRect(tx, 0, tileW - 2, tileH);
    }
  }
  // Fallen tile (tile 3 is missing - hanging)
  ctx.save();
  const ftx = 3 * tileW + tileW / 2;
  ctx.translate(ftx, tileH);
  ctx.rotate(Math.sin(frameCount * 0.005) * 0.05 + 0.3);
  ctx.fillStyle = '#0a1020';
  ctx.fillRect(-tileW / 2, 0, tileW - 2, tileH);
  ctx.strokeStyle = '#0d1528';
  ctx.strokeRect(-tileW / 2, 0, tileW - 2, tileH);
  ctx.restore();

  // Dark gap where tile fell
  ctx.fillStyle = '#000';
  ctx.fillRect(3 * tileW, 0, tileW - 2, tileH);
  // Cables hanging from gap
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 2;
  for (let c = 0; c < 3; c++) {
    const cx = 3 * tileW + 10 + c * 20;
    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.quadraticCurveTo(cx + Math.sin(frameCount * 0.02 + c) * 5, tileH + 20 + c * 10, cx - 5, tileH + 30 + c * 15);
    ctx.stroke();
  }

  // Neon lamps
  for (let i = 0; i < 4; i++) {
    const lx = SPLIT_X * (0.15 + i * 0.22);
    const isFlickering = (i === 2);
    let on = true;
    if (isFlickering) {
      on = ambient.lampOn;
      ambient.lampFlicker -= deltaTime;
      if (ambient.lampFlicker <= 0) {
        ambient.lampOn = !ambient.lampOn;
        ambient.lampFlicker = ambient.lampOn ? rand(1, 4) : rand(0.05, 0.2);
      }
    }
    if (on) {
      ctx.fillStyle = isFlickering ? 'rgba(100,200,255,0.5)' : 'rgba(80,160,220,0.3)';
      ctx.fillRect(lx - 30, tileH + 2, 60, 4);
      drawGlow(lx, tileH + 4, isFlickering ? 60 : 40, '#4488cc', isFlickering ? 0.2 : 0.1);
    }
    // Lamp fixture
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(lx - 35, tileH, 70, 6);
  }

  // Cables from ceiling to server
  ctx.strokeStyle = '#223';
  ctx.lineWidth = 1.5;
  for (let c = 0; c < 4; c++) {
    const startX = SPLIT_X * 0.5 + c * 15;
    ctx.beginPath();
    ctx.moveTo(startX, 0);
    ctx.bezierCurveTo(startX, H * 0.15, SPLIT_X * 0.85 + c * 5, H * 0.1, SPLIT_X * 0.85, H * 0.15 + c * 20);
    ctx.stroke();
  }
}

function drawDesk(desk, idx) {
  const { x, y, w, h, monX, monY } = desk;

  // Desk body
  ctx.fillStyle = '#0c1825';
  ctx.strokeStyle = '#1a3050';
  ctx.lineWidth = 1;
  drawRoundRect(x, y, w, h, 3);
  ctx.fill();
  ctx.stroke();

  // Desk legs
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(x + 5, y + h, 4, 20);
  ctx.fillRect(x + w - 9, y + h, 4, 20);

  // Monitor
  const mw = 50, mh = 36;
  ctx.fillStyle = '#080808';
  ctx.strokeStyle = '#1a3050';
  drawRoundRect(monX, monY, mw, mh, 2);
  ctx.fill();
  ctx.stroke();
  // Monitor stand
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(monX + mw / 2 - 4, monY + mh, 8, 8);
  ctx.fillRect(monX + mw / 2 - 10, monY + mh + 8, 20, 3);

  // Screen content (scrolling code)
  ctx.save();
  ctx.beginPath();
  ctx.rect(monX + 2, monY + 2, mw - 4, mh - 4);
  ctx.clip();
  const scrollOff = (frameCount * 0.3 + idx * 100) % 200;
  const codeColors = ['#00ff88', '#0088ff', '#ffaa00', '#ff44cc', '#44ffcc'];
  for (let line = 0; line < 12; line++) {
    const ly = monY + 4 + line * 3.5 - scrollOff % 14;
    if (ly < monY + 2 || ly > monY + mh - 2) continue;
    const cw = 5 + ((idx * 7 + line * 13) % 30);
    ctx.fillStyle = codeColors[(idx + line) % codeColors.length] + '60';
    ctx.fillRect(monX + 4, ly, cw, 2);
    if (line % 3 === 0) {
      ctx.fillStyle = codeColors[(idx + line + 2) % codeColors.length] + '40';
      ctx.fillRect(monX + 6 + cw, ly, 10, 2);
    }
  }
  ctx.restore();

  // Keyboard
  ctx.fillStyle = '#0a0a0a';
  ctx.strokeStyle = '#1a2030';
  ctx.lineWidth = 0.5;
  ctx.fillRect(x + w / 2 - 18, y + 5, 36, 12);
  ctx.strokeRect(x + w / 2 - 18, y + 5, 36, 12);
  // Keys
  for (let r = 0; r < 3; r++) {
    for (let k = 0; k < 8; k++) {
      ctx.fillStyle = '#151520';
      ctx.fillRect(x + w / 2 - 16 + k * 4, y + 7 + r * 3.5, 3, 2.5);
    }
  }

  // Stickers on desk edge
  const stickers = ['💾', '🔥', '⚡', '🐛', '☕'];
  const sticker = stickers[idx % stickers.length];
  ctx.font = '8px serif';
  ctx.fillText(sticker, x + w - 15, y + 3);

  // Mug or can
  if (idx % 2 === 0) {
    // Coffee mug
    ctx.fillStyle = '#1a2030';
    ctx.fillRect(x + w - 20, y + 2, 8, 10);
    ctx.strokeStyle = '#334';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(x + w - 8, y + 7, 4, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();
  } else {
    // Energy drink can
    ctx.fillStyle = '#1a3010';
    ctx.fillRect(x + 8, y + 2, 6, 12);
    ctx.fillStyle = '#00ff44';
    ctx.fillRect(x + 8, y + 6, 6, 3);
  }

  // Crumpled papers and cables under desk
  ctx.fillStyle = '#111820';
  for (let p = 0; p < 3; p++) {
    const px = x + 10 + p * 25 + (idx * 7 % 10);
    const py = y + h + 15;
    ctx.beginPath();
    ctx.arc(px, py, 4 + p % 2 * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  // Cable
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w, y + h);
  ctx.quadraticCurveTo(x + w + 10, y + h + 25, x + w - 5, y + h + 20);
  ctx.stroke();
}

function drawServerRack() {
  const rx = SPLIT_X * 0.82;
  const ry = H * 0.12;
  const rw = SPLIT_X * 0.14;
  const rh = H * 0.55;
  const unitH = rh / 12;

  // Rack frame
  ctx.fillStyle = '#080c15';
  ctx.strokeStyle = '#1a2838';
  ctx.lineWidth = 2;
  drawRoundRect(rx, ry, rw, rh, 4);
  ctx.fill();
  ctx.stroke();

  // Side rails
  ctx.fillStyle = '#0f1a28';
  ctx.fillRect(rx + 2, ry + 2, 4, rh - 4);
  ctx.fillRect(rx + rw - 6, ry + 2, 4, rh - 4);

  // Units
  for (let u = 0; u < 11; u++) {
    const ux = rx + 8;
    const uy = ry + 6 + u * unitH;
    const uw = rw - 16;
    const uh = unitH - 4;

    ctx.fillStyle = '#0a1020';
    ctx.strokeStyle = '#152030';
    ctx.lineWidth = 0.5;
    drawRoundRect(ux, uy, uw, uh, 2);
    ctx.fill();
    ctx.stroke();

    // Ventilation holes
    for (let v = 0; v < 5; v++) {
      ctx.fillStyle = '#060810';
      ctx.fillRect(ux + 4 + v * (uw / 6), uy + uh / 2 - 1, uw / 8, 2);
    }

    // LED indicators
    const ledStates = ['ok', 'ok', 'working', 'ok', 'error', 'ok', 'working', 'ok', 'ok', 'ok', 'working'];
    const state = ledStates[u];
    let ledColor;
    if (state === 'ok') ledColor = '#00ff44';
    else if (state === 'error') ledColor = (Math.sin(frameCount * 0.1) > 0) ? '#ff2244' : '#440000';
    else ledColor = (Math.sin(frameCount * 0.15 + u) > 0) ? '#ffaa00' : '#332200';

    ctx.fillStyle = ledColor;
    ctx.beginPath();
    ctx.arc(ux + uw - 8, uy + uh / 2, 2, 0, Math.PI * 2);
    ctx.fill();
    drawGlow(ux + uw - 8, uy + uh / 2, 8, ledColor, 0.3);

    // Second LED for some units
    if (u % 3 === 0) {
      ctx.fillStyle = '#00ff44';
      ctx.beginPath();
      ctx.arc(ux + uw - 16, uy + uh / 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Hanging cables from rack
  const cableColors = ['#0044aa', '#00aa44', '#aa4400', '#aa0044', '#4400aa'];
  for (let c = 0; c < 5; c++) {
    ctx.strokeStyle = cableColors[c] + '80';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const cy = ry + (c + 2) * unitH;
    ctx.moveTo(rx + rw, cy);
    ctx.bezierCurveTo(
      rx + rw + 15, cy + 10,
      rx + rw + 5 + Math.sin(frameCount * 0.01 + c) * 5, cy + 30 + c * 5,
      rx + rw + 8, ry + rh + 10 + c * 3
    );
    ctx.stroke();
  }
}

function drawCoffeeMachine() {
  const cx = SPLIT_X * 0.05;
  const cy = H * 0.55;
  const cw = 40;
  const ch = 55;

  // Machine body
  ctx.fillStyle = '#1a1a2a';
  ctx.strokeStyle = '#2a2a3a';
  ctx.lineWidth = 1;
  drawRoundRect(cx, cy, cw, ch, 4);
  ctx.fill();
  ctx.stroke();

  // Display
  ctx.fillStyle = '#001100';
  ctx.fillRect(cx + 5, cy + 5, cw - 10, 12);
  ctx.fillStyle = '#00ff44';
  ctx.font = '6px "Share Tech Mono", monospace';
  ctx.fillText('COFFEE', cx + 7, cy + 13);

  // Buttons
  ctx.fillStyle = '#333';
  for (let b = 0; b < 3; b++) {
    ctx.beginPath();
    ctx.arc(cx + 10 + b * 10, cy + 24, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nozzle
  ctx.fillStyle = '#222';
  ctx.fillRect(cx + cw / 2 - 5, cy + 30, 10, 6);

  // Cup under nozzle
  ctx.fillStyle = '#ddd';
  ctx.fillRect(cx + cw / 2 - 7, cy + 38, 14, 10);
  ctx.fillStyle = '#5a3a1a';
  const fillLevel = ambient.coffeeOverflow ? 9 : 5 + Math.sin(frameCount * 0.02) * 2;
  ctx.fillRect(cx + cw / 2 - 5, cy + 38 + (10 - fillLevel), 10, fillLevel);

  // Overflow timer
  ambient.coffeeTimer += deltaTime;
  if (ambient.coffeeTimer > 20) {
    ambient.coffeeOverflow = true;
    if (ambient.coffeeTimer > 25) {
      ambient.coffeeOverflow = false;
      ambient.coffeeTimer = 0;
    }
  }

  // Coffee puddle
  if (ambient.coffeeOverflow) {
    ctx.fillStyle = '#3a2a1a80';
    ctx.beginPath();
    ctx.ellipse(cx + cw / 2, cy + ch + 5, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Paw prints near coffee machine
  ctx.fillStyle = '#2a1a1a30';
  for (let p = 0; p < 3; p++) {
    const px = cx + cw + 10 + p * 18;
    const py = cy + ch + 2 + Math.sin(p * 1.5) * 5;
    // Main pad
    ctx.beginPath();
    ctx.ellipse(px, py, 3, 4, Math.sin(p) * 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Toe pads
    for (let t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.arc(px - 3 + t * 3, py - 4, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Steam
  for (let s = 0; s < 3; s++) {
    const st = (frameCount * 0.03 + s * 1.5) % 3;
    const sx = cx + cw / 2 + Math.sin(frameCount * 0.02 + s * 2) * 4;
    const sy = cy + 32 - st * 10;
    ctx.globalAlpha = 0.15 * (1 - st / 3);
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(sx, sy, 3 + st * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Coffee puddle on floor
  ctx.fillStyle = '#2a1a0a40';
  ctx.beginPath();
  ctx.ellipse(cx + cw / 2 + 20, cy + ch + 10, 12, 5, 0.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawTV() {
  const bp = getBurrowPositions();
  const { x, y, w, h } = bp.tv;

  // TV stand
  ctx.fillStyle = '#1a1010';
  ctx.fillRect(x + 10, y + h, w - 20, 15);
  // Legs
  ctx.fillRect(x + 15, y + h + 15, 6, 10);
  ctx.fillRect(x + w - 21, y + h + 15, 6, 10);

  // TV body (chunky old CRT)
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#2a2020';
  ctx.lineWidth = 2;
  drawRoundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.stroke();

  // Screen
  const sx = x + 8, sy = y + 8, sw = w - 16, sh = h - 16;
  ctx.fillStyle = '#000';
  ctx.fillRect(sx, sy, sw, sh);

  // Screen content — cycle between noise, pixel game, censored content
  const tvMode = Math.floor(frameCount / 300) % 3;
  ctx.save();
  ctx.beginPath();
  ctx.rect(sx, sy, sw, sh);
  ctx.clip();

  if (tvMode === 0) {
    // Static noise
    for (let ny = 0; ny < sh; ny += 3) {
      for (let nx = 0; nx < sw; nx += 3) {
        const v = Math.random() * 80;
        ctx.fillStyle = `rgb(${v},${v},${v})`;
        ctx.fillRect(sx + nx, sy + ny, 3, 3);
      }
    }
  } else if (tvMode === 1) {
    // Pixel game (simple platformer)
    ctx.fillStyle = '#001133';
    ctx.fillRect(sx, sy, sw, sh);
    // Ground
    ctx.fillStyle = '#226622';
    ctx.fillRect(sx, sy + sh - 8, sw, 8);
    // Character
    const charX = sx + (frameCount * 0.5 % sw);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(charX, sy + sh - 16, 6, 8);
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(charX + 1, sy + sh - 20, 4, 4);
    // Blocks
    for (let b = 0; b < 3; b++) {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx + 20 + b * 30, sy + sh - 24 - b * 6, 14, 8);
    }
    // Coins
    ctx.fillStyle = '#ffdd00';
    for (let c = 0; c < 4; c++) {
      ctx.beginPath();
      ctx.arc(sx + 15 + c * 25, sy + sh - 30, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // "Content" with censor block
    ctx.fillStyle = '#1a0a0a';
    ctx.fillRect(sx, sy, sw, sh);
    // Silhouettes
    ctx.fillStyle = '#3a1a1a';
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.3, sy + sh * 0.5, 12, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.7, sy + sh * 0.5, 10, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // Censor square
    const censSize = 20 + Math.sin(frameCount * 0.03) * 3;
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + sw / 2 - censSize / 2, sy + sh / 2 - censSize / 2, censSize, censSize);
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + sw / 2 - censSize / 2, sy + sh / 2 - censSize / 2, censSize, censSize);
    ctx.fillStyle = '#ff0000';
    ctx.font = '6px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('18+', sx + sw / 2, sy + sh / 2 + 2);
    ctx.textAlign = 'left';
  }
  ctx.restore();

  // Power LED
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(x + w - 12, y + h - 6, 2, 0, Math.PI * 2);
  ctx.fill();

  // Console
  const consX = bp.console.x;
  const consY = bp.console.y;
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  drawRoundRect(consX, consY, 40, 12, 3);
  ctx.fill();
  ctx.stroke();
  // Blue LED
  ctx.fillStyle = '#0066ff';
  ctx.beginPath();
  ctx.arc(consX + 10, consY + 6, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Disc slot
  ctx.strokeStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(consX + 15, consY + 4);
  ctx.lineTo(consX + 35, consY + 4);
  ctx.stroke();

  // Gamepads
  ctx.fillStyle = '#222';
  // Pad 1
  drawRoundRect(consX - 15, consY + 15, 18, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(consX - 9, consY + 20, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0044aa';
  ctx.beginPath();
  ctx.arc(consX - 2, consY + 20, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Pad 2
  ctx.fillStyle = '#222';
  drawRoundRect(consX + 42, consY + 18, 18, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(consX + 48, consY + 23, 2, 0, Math.PI * 2);
  ctx.fill();

  // Game discs scattered
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  for (let d = 0; d < 3; d++) {
    const dx = consX + 5 + d * 20;
    const dy = consY + 32 + d * 3;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(d * 0.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 3, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = ['#220044', '#002244', '#224400'][d];
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, 0, 2, 0.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.restore();
  }
}

function drawBed() {

  ctx.strokeStyle = '#2a2525';
  ctx.stroke();

  // Phone face down
  ctx.fillStyle = '#111';
  ctx.save();
  ctx.translate(x + w - 25, y + 15);
  ctx.rotate(0.3);
  drawRoundRect(-6, -10, 12, 20, 2);
  ctx.fill();
  ctx.restore();

  // Slippers
  // Slipper 1 (normal)
  ctx.fillStyle = '#5a3a2a';
  ctx.beginPath();
  ctx.ellipse(x + 10, y + h + 15, 8, 5, -0.2, 0, Math.PI * 2);

  ctx.fillStyle = '#6a4a3a';
  ctx.beginPath();
  ctx.ellipse(x + 10, y + h + 12, 6, 3, -0.2, 0, Math.PI);

  // Slipper 2 (on its side)

  ctx.save();
  ctx.translate(x + 35, y + h + 16);
  ctx.rotate(1.2);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);

}

function drawPizzaTower() {
  const bp = getBurrowPositions();
  const { x, y } = bp.pizza;

  // Stack of pizza boxes
  const boxH = 8;
  const boxW = 35;
  for (let b = 0; b < 6; b++) {
    const bx = x + Math.sin(b * 0.7) * 3;
    const by = y - b * boxH;
    ctx.fillStyle = b === 5 ? '#8a6a3a' : '#6a4a2a';
    ctx.strokeStyle = '#4a3a1a';
    ctx.lineWidth = 0.5;
    drawRoundRect(bx, by, boxW, boxH, 1);
    ctx.fill();
    ctx.stroke();

    if (b < 5) {
      // Logo on box
      ctx.fillStyle = '#3a2a1a';
      ctx.beginPath();
      ctx.arc(bx + boxW / 2, by + boxH / 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Top box is open
  const topY = y - 5 * boxH;
  ctx.fillStyle = '#8a6a3a';
  ctx.save();
  ctx.translate(x, topY);
  ctx.rotate(-0.15);
  drawRoundRect(0, -boxH, boxW, boxH, 1);
  ctx.fill();
  ctx.strokeStyle = '#4a3a1a';
  ctx.stroke();
  ctx.restore();

  // Pizza inside top box
  ctx.fillStyle = '#cc8833';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 0, Math.PI * 2);
  ctx.fill();
  // Sauce
  ctx.fillStyle = '#aa2222';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 10, 0, Math.PI * 2);
  ctx.fill();
  // Cheese
  ctx.fillStyle = '#ddaa33';
  ctx.beginPath();
  ctx.arc(x + boxW / 2, topY + boxH / 2, 9, 0, Math.PI * 2);
  ctx.fill();
  // Missing slices (2 gone)
  ctx.fillStyle = '#8a6a3a';
  ctx.beginPath();
  ctx.moveTo(x + boxW / 2, topY + boxH / 2);
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 0.3, 0.9);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + boxW / 2, topY + boxH / 2);
  ctx.arc(x + boxW / 2, topY + boxH / 2, 12, 2.5, 3.1);
  ctx.closePath();
  ctx.fill();

  // Pepperoni
  ctx.fillStyle = '#882222';
  for (let p = 0; p < 5; p++) {
    const pa = p * 1.2 + 1;
    const pr = 5 + Math.random() * 3;
    ctx.beginPath();
    ctx.arc(x + boxW / 2 + Math.cos(pa) * pr, topY + boxH / 2 + Math.sin(pa) * pr, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Napkins and sauce packets scattered
  ctx.fillStyle = '#eee';
  ctx.save();
  ctx.translate(x + boxW + 8, y - 10);
  ctx.rotate(0.3);
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
  ctx.fillStyle = '#ddd';
  ctx.save();
  ctx.translate(x + boxW + 15, y);
  ctx.rotate(-0.5);
  ctx.fillRect(-5, -5, 10, 10);
  ctx.restore();
  // Sauce packet
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(x - 8, y + 5, 8, 4);
}

function drawFridge() {
  const bp = getBurrowPositions();
  const { x, y, w, h } = bp.fridge;

  // Fridge body
  ctx.fillStyle = '#e8e0d0';
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  drawRoundRect(x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  // Door slightly open - light coming out
  const doorAngle = 0.15;
  ctx.save();
  ctx.translate(x + w, y);
  ctx.rotate(doorAngle);

  // Door
  ctx.fillStyle = '#d8d0c0';
  ctx.strokeStyle = '#999';
  drawRoundRect(-w + 2, 0, w - 2, h, 3);
  ctx.fill();
  ctx.stroke();

  // Handle
  ctx.fillStyle = '#888';
  drawRoundRect(-8, h * 0.35, 3, 20, 1);
  ctx.fill();

  ctx.restore();

  // Light from crack
  ctx.fillStyle = 'rgba(255,255,200,0.1)';
  ctx.beginPath();
  ctx.moveTo(x + w + 2, y + 5);
  ctx.lineTo(x + w + 30, y - 10);
  ctx.lineTo(x + w + 30, y + h + 10);
  ctx.lineTo(x + w + 2, y + h - 5);
  ctx.closePath();
  ctx.fill();

  // Interior glow
  drawGlow(x + w, y + h / 2, 25, '#ffffaa', 0.15);

  // Magnets on door
  const magnets = ['🐀', '🧀', '😂', '🍕'];
  ctx.font = '8px serif';
  for (let m = 0; m < magnets.length; m++) {
    ctx.fillText(magnets[m], x + 8 + (m % 2) * 18, y + 15 + Math.floor(m / 2) * 25);
  }

  // Puddle under fridge
  ctx.fillStyle = '#4488aa20';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h + 8, w * 0.6, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Drip animation
  ambient.dropTimer += deltaTime;
  if (!ambient.dropFalling && ambient.dropTimer > 2) {
    ambient.dropFalling = true;
    ambient.dropY = y + h;
    ambient.dropTimer = 0;
  }
  if (ambient.dropFalling) {
    ambient.dropY += 40 * deltaTime;
    ctx.fillStyle = '#6abbe8';
    ctx.beginPath();
    ctx.ellipse(x + w / 2, ambient.dropY, 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    if (ambient.dropY > y + h + 8) {
      ambient.dropFalling = false;
      // Ripple particle
      spawnParticle(x + w / 2, y + h + 8, 0, 0, 0.5, '#6abbe8', 4, 0);
    }
  }
}

function drawSpiderweb() {
  const bx = W - 60;
  const by = 15;

  // Web
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 0.5;

  // Radials
  const arms = 8;
  const radius = 45;
  for (let a = 0; a < arms; a++) {
    const angle = (a / arms) * Math.PI * 0.7 + Math.PI * 0.8;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx + Math.cos(angle) * radius, by + Math.sin(angle) * radius);
    ctx.stroke();
  }

  // Rings
  for (let r = 1; r <= 4; r++) {
    const rr = r * (radius / 4);
    ctx.beginPath();
    for (let a = 0; a <= arms; a++) {
      const angle = (a / arms) * Math.PI * 0.7 + Math.PI * 0.8;
      const px = bx + Math.cos(angle) * rr;
      const py = by + Math.sin(angle) * rr;
      if (a === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // Spider
  const spX = bx + Math.cos(ambient.spiderX) * 20;
  const spY = by + 20 + Math.sin(ambient.spiderX * 1.3) * 8;
  ambient.spiderX += deltaTime * 0.2;

  // Body
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(spX, spY, 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(spX, spY - 4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Legs
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  for (let l = 0; l < 4; l++) {
    const la = l * 0.4 + 0.3;
    ctx.beginPath();
    ctx.moveTo(spX, spY);
    ctx.quadraticCurveTo(spX + Math.cos(la) * 6, spY + 3, spX + Math.cos(la) * 8, spY + 6 + l);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(spX, spY);
    ctx.quadraticCurveTo(spX - Math.cos(la) * 6, spY + 3, spX - Math.cos(la) * 8, spY + 6 + l);
    ctx.stroke();
  }
  // Eyes (red dots)
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(spX - 1, spY - 5, 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(spX + 1, spY - 5, 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawRat(agent, x, y, facing, scale) {
  const s = scale || 1;
  const f = facing || 1; // 1=right, -1=left
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(f * s, s);

  const def = agent.def;
  const id = def.id;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 18, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // BODY — each rat has unique outfit
  drawRatBody(id, def);

  // HEAD
  drawRatHead(id, def, agent);

  // ACCESSORIES per agent
  drawRatAccessories(id, def);

  ctx.restore();
}

      drawRoundRect(-10, -5, 20, 23, 5);
      ctx.fill();
      // Pen pocket (lots of pens!)
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-9, -3, 8, 6);
      const penColors = ['#ff0000', '#0000ff', '#00aa00', '#ff8800', '#8800ff', '#000'];
      penColors.forEach((c, i) => {
        ctx.fillStyle = c;
        ctx.fillRect(-8 + i * 1.2, -3, 1, 5 + (i % 3));
      });
      break;

    case 'zamokrys': // Dark tactical
      ctx.fillStyle = '#1a1a1a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Tactical vest
      ctx.fillStyle = '#2a2a2a';
      ctx.fillRect(-9, -2, 18, 15);
      // Pouches
      ctx.fillStyle = '#333';
      ctx.fillRect(-9, 5, 5, 4);
      ctx.fillRect(4, 5, 5, 4);
      ctx.fillRect(-9, 10, 5, 3);
      // USB flash drives on belt
      ctx.fillStyle = '#444';
      ctx.fillRect(-3, 14, 3, 5);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-2, 15, 1, 1);
      ctx.fillStyle = '#444';
      ctx.fillRect(1, 14, 3, 5);
      break;

    case 'nornik': // Orange overalls
      ctx.fillStyle = '#cc6600';
      drawRoundRect(-10, -5, 20, 23, 5);
      ctx.fill();
      // Straps
      ctx.fillStyle = '#aa5500';
      ctx.fillRect(-6, -5, 3, 12);
      ctx.fillRect(3, -5, 3, 12);
      // Tool belt
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-10, 10, 20, 4);
      // Wrench
      ctx.fillStyle = '#aaa';
      ctx.fillRect(8, 8, 2, 8);
      ctx.fillRect(7, 6, 4, 3);
      break;

    case 'syrolog': // Striped blazer
      ctx.fillStyle = '#2a2a4a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Stripes
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      for (let s = 0; s < 5; s++) {
        ctx.beginPath();
        ctx.moveTo(-8 + s * 4, -3);
        ctx.lineTo(-8 + s * 4, 16);
        ctx.stroke();
      }
      // Gold chain
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-4, -3);
      ctx.quadraticCurveTo(0, 5, 4, -3);
      ctx.stroke();
      // 🧀 pendant
      ctx.fillStyle = '#ddaa22';
      ctx.beginPath();
      ctx.arc(0, 3, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'arhivary': // Cardigan with diamond pattern
      ctx.fillStyle = '#5a4a4a';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Diamond pattern
      ctx.strokeStyle = '#6a5a5a';
      ctx.lineWidth = 0.5;
      for (let dy = 0; dy < 4; dy++) {
        for (let dx = 0; dx < 3; dx++) {
          const cx = -6 + dx * 6;
          const cy = 1 + dy * 5;
          ctx.beginPath();
          ctx.moveTo(cx, cy - 2);
          ctx.lineTo(cx + 2, cy);
          ctx.lineTo(cx, cy + 2);
          ctx.lineTo(cx - 2, cy);
          ctx.closePath();
          ctx.stroke();
        }
      }
      break;

    case 'planogriz': // Dress shirt + tie
      ctx.fillStyle = '#e8e8ff';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
      // Tie
      ctx.fillStyle = '#2244aa';
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.lineTo(2, 4);
      ctx.lineTo(0, 14);
      ctx.lineTo(-2, 4);
      ctx.closePath();
      ctx.fill();
      // Watch on wrist
      ctx.fillStyle = '#333';
      ctx.fillRect(-13, 11, 4, 3);
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(-12, 11.5, 2, 2);
      break;

    default: // Generic body for stage 2 agents
      ctx.fillStyle = '#777';
      drawRoundRect(-10, -5, 20, 22, 5);
      ctx.fill();
  }

  // Legs (simple)
  ctx.fillStyle = '#666';
  ctx.fillRect(-6, 16, 4, 6);
  ctx.fillRect(2, 16, 4, 6);
  // Feet
  ctx.fillStyle = '#555';
  ctx.fillRect(-7, 21, 6, 2);
  ctx.fillRect(1, 21, 6, 2);
}

function drawRatHead(id, def, agent) {
  const t = frameCount * 0.001;

  // Base head
  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.ellipse(0, -14, 9, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#aa9999';
  ctx.beginPath();
  ctx.ellipse(8, -12, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#ff8888';
  ctx.beginPath();
  ctx.arc(12, -12, 2, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#bb9999';
  ctx.beginPath();
  ctx.ellipse(-4, -22, 5, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffaaaa';
  ctx.beginPath();
  ctx.ellipse(-4, -22, 3, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#bb9999';
  ctx.beginPath();
  ctx.ellipse(4, -22, 5, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffaaaa';
  ctx.beginPath();
  ctx.ellipse(4, -22, 3, 5, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (unique color per agent)
  const eyeColor = def.eyes;
  const blinkPhase = Math.sin(t * 3 + agent.blinkOffset);
  const eyeH = blinkPhase > 0.95 ? 0.5 : 2.5;

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(2, -15, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -14, 2.5, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.ellipse(2, -15, 1.5, eyeH, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -14, 1.2, eyeH * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye glow
  drawGlow(2, -15, 6, eyeColor, 0.15);

  // Whiskers
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 0.5;
  for (let w = 0; w < 3; w++) {
    const wy = -13 + w * 2;
    ctx.beginPath();
    ctx.moveTo(11, wy);
    ctx.lineTo(20, wy - 2 + w * 2 + Math.sin(t * 2 + w) * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(11, wy);
    ctx.lineTo(20, wy + 1 + Math.sin(t * 2 + w + 1) * 0.5);
    ctx.stroke();
  }

  // Tail
  ctx.strokeStyle = '#aa8888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, 10);
  ctx.bezierCurveTo(-18, 5, -22, 15 + Math.sin(t * 2) * 3, -28, 8 + Math.sin(t * 1.5) * 5);
  ctx.stroke();

  // Per-agent head accessories
  switch (id) {
    case 'shnyr':
      // Monocle (glowing)
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(8, -14, 4, 0, Math.PI * 2);
      ctx.stroke();
      drawGlow(8, -14, 8, '#FFD700', 0.2);
      // Monocle chain
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(4, -14);
      ctx.quadraticCurveTo(0, -8, -2, -3);
      ctx.stroke();
      break;

    case 'nyuhach':
      // Long nose (extended snout)
      ctx.fillStyle = '#aa9999';
      ctx.beginPath();
      ctx.ellipse(14, -12, 4, 3, 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Nose tip more forward
      ctx.fillStyle = '#ff8888';
      ctx.beginPath();
      ctx.arc(17, -12, 2.5, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'arhinor':
      // Blue hard hat with ARCH
      ctx.fillStyle = '#2244aa';
      ctx.beginPath();
      ctx.ellipse(0, -20, 11, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(-11, -20, 22, 3);
      // Brim
      ctx.fillStyle = '#1a3388';
      ctx.fillRect(-13, -18, 26, 3);
      // ARCH text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 4px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('ARCH', 0, -20);
      ctx.textAlign = 'left';
      // Pencil behind ear
      ctx.fillStyle = '#ddcc00';
      ctx.save();
      ctx.translate(6, -22);
      ctx.rotate(0.5);
      ctx.fillRect(-1, -6, 2, 10);
      ctx.fillStyle = '#ff8866';
      ctx.fillRect(-1, -6, 2, 2);
      ctx.restore();
      break;

    case 'kodogryz':
      // Matrix-style eye override (green digital rain in eyes)
      ctx.fillStyle = '#00ff88';
      ctx.font = '3px monospace';
      const digit1 = Math.floor(frameCount / 10) % 2;
      const digit2 = (Math.floor(frameCount / 10) + 1) % 2;
      ctx.fillText(digit1.toString(), 1, -14);
      ctx.fillText(digit2.toString(), 7, -13);
      // Tooth (prominent)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(9, -10);
      ctx.lineTo(10, -7);
      ctx.lineTo(8, -7);
      ctx.closePath();
      ctx.fill();
      break;

    case 'piskel':
      // Pink beret
      ctx.fillStyle = '#ff44cc';
      ctx.beginPath();
      ctx.ellipse(0, -22, 10, 4, -0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, -22, 8, Math.PI, 0, true);
      ctx.fill();
      // Beret knob
      ctx.fillStyle = '#ff66dd';
      ctx.beginPath();
      ctx.arc(-2, -26, 2, 0, Math.PI * 2);
      ctx.fill();
      // Headphones
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -16, 10, Math.PI * 0.8, Math.PI * 0.2, true);
      ctx.stroke();
      ctx.fillStyle = '#444';
      ctx.fillRect(-11, -18, 4, 6);
      ctx.fillRect(7, -18, 4, 6);
      break;

    case 'shurshik':
      // Lab goggles
      ctx.fillStyle = '#ddd';
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      // Left goggle
      ctx.beginPath();
      ctx.ellipse(1, -15, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Right goggle
      ctx.beginPath();
      ctx.ellipse(9, -14, 4, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // Strap
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-4, -15);
      ctx.lineTo(-7, -16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(13, -14);
      ctx.lineTo(16, -15);
      ctx.stroke();
      // Green tint in lenses
      ctx.fillStyle = '#88ff8830';
      ctx.beginPath();
      ctx.ellipse(1, -15, 3.5, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(9, -14, 2.5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Grumpy mouth
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(8, -9, 4, 0.2, Math.PI - 0.2, true);
      ctx.stroke();
      break;

    case 'zamokrys':
      // Balaclava with ears poking through
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.ellipse(0, -14, 10, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eye holes
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(2, -15, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8, -14, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Re-draw eyes over balaclava
      ctx.fillStyle = def.eyes;
      ctx.beginPath();
      ctx.ellipse(2, -15, 1.5, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(8, -14, 1.2, 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
      drawGlow(2, -15, 6, def.eyes, 0.2);
      // Lock pendant
      ctx.fillStyle = '#888';
      ctx.fillRect(-2, -4, 4, 5);
      ctx.beginPath();
      ctx.arc(0, -4, 3, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(0, -1, 1, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'nornik':
      // Orange hard hat
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.ellipse(0, -20, 11, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(-11, -20, 22, 3);
      ctx.fillStyle = '#dd7700';
      ctx.fillRect(-13, -18, 26, 3);
      // Headlamp
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(10, -19, 3, 0, Math.PI * 2);
      ctx.fill();
      drawGlow(10, -19, 8, '#ffff00', 0.2);
      break;

    case 'syrolog':
      // Bowler hat
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(0, -22, 10, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, -24, 7, 5, 0, Math.PI, 0);
      ctx.fill();
      // Wide smile
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(7, -10, 5, 0, Math.PI * 0.8);
      ctx.stroke();
      // Gold tooth
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(6, -9, 2, 2);
      break;

    case 'arhivary':
      // Huge round glasses
      ctx.strokeStyle = '#6688aa';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(2, -15, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(9, -14, 4.5, 0, Math.PI * 2);
      ctx.stroke();
      // Bridge
      ctx.beginPath();
      ctx.moveTo(7, -15);
      ctx.lineTo(4.5, -14.5);
      ctx.stroke();
      // Lens shine
      ctx.fillStyle = '#ffffff20';
      ctx.beginPath();
      ctx.arc(1, -16, 2, 0, Math.PI * 2);
      ctx.fill();
      // Braid/ponytail
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6, -14);
      ctx.bezierCurveTo(-10, -10, -12, -5, -10, 0);
      ctx.stroke();
      // Hair tie
      ctx.fillStyle = '#ff4488';
      ctx.beginPath();
      ctx.arc(-10, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'planogriz':
      // Slicked-back hair
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.moveTo(-8, -18);
      ctx.quadraticCurveTo(0, -25, 8, -18);
      ctx.quadraticCurveTo(5, -16, -5, -16);
      ctx.closePath();
      ctx.fill();
      // Wristwatch (repeat from body but more visible)
      break;

    default:
      break;
  }
}

function drawRatAccessories(id, def) {
  switch (id) {
    case 'shnyr':
      // Pointer stick
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(12, 5);
      ctx.lineTo(28, -8);
      ctx.stroke();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(28, -8, 2, 0, Math.PI * 2);
      ctx.fill();
      // Folder
      ctx.fillStyle = '#ddaa44';
      ctx.fillRect(-16, 5, 8, 12);
      ctx.fillStyle = '#cc9933';
      ctx.fillRect(-16, 5, 8, 2);
      break;

    case 'nyuhach':
      // Giant magnifying glass
      ctx.strokeStyle = '#aa8844';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(18, -8, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Glass fill
      ctx.fillStyle = '#88ccff15';
      ctx.beginPath();
      ctx.arc(18, -8, 7, 0, Math.PI * 2);
      ctx.fill();
      // Handle
      ctx.strokeStyle = '#664422';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(12, -2);
      ctx.lineTo(6, 8);
      ctx.stroke();
      // Tags
      ctx.fillStyle = '#ff444480';
      ctx.font = '4px "Share Tech Mono"';
      ctx.fillText('NPM', -15, -2);
      ctx.fillStyle = '#44ff8880';
      ctx.fillText('GH', -15, 5);
      break;

    case 'arhinor':
      // Blueprint/scroll
      ctx.fillStyle = '#4488cc';
      ctx.fillRect(-16, 3, 12, 16);
      ctx.fillStyle = '#ffffff20';
      // Blueprint grid
      ctx.strokeStyle = '#ffffff15';
      ctx.lineWidth = 0.3;
      for (let g = 0; g < 5; g++) {
        ctx.beginPath();
        ctx.moveTo(-15, 5 + g * 3);
        ctx.lineTo(-5, 5 + g * 3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-14 + g * 2.5, 4);
        ctx.lineTo(-14 + g * 2.5, 18);
        ctx.stroke();
      }
      break;

    case 'kodogryz':
      // Laptop with circuit board texture
      ctx.fillStyle = '#1a2a1a';
      ctx.strokeStyle = '#00ff8830';
      ctx.lineWidth = 0.5;
      ctx.fillRect(10, 5, 16, 10);
      ctx.strokeRect(10, 5, 16, 10);
      // Circuit traces
      ctx.strokeStyle = '#00ff8840';
      ctx.beginPath();
      ctx.moveTo(12, 8);
      ctx.lineTo(16, 8);
      ctx.lineTo(16, 12);
      ctx.lineTo(22, 12);
      ctx.stroke();
      // Screen glow
      ctx.fillStyle = '#00ff8815';
      ctx.fillRect(11, 6, 14, 8);
      // USB flash
      ctx.fillStyle = '#444';
      ctx.fillRect(-16, 8, 4, 6);
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(-15, 10, 2, 1);
      break;

    case 'piskel':
      // Stylus
      ctx.fillStyle = '#666';
      ctx.save();
      ctx.translate(14, 2);
      ctx.rotate(-0.5);
      ctx.fillRect(-1, -8, 2, 16);
      ctx.fillStyle = '#ff44cc';
      ctx.fillRect(-1.5, 6, 3, 3);
      ctx.restore();
      // Tablet on chain
      ctx.fillStyle = '#333';
      drawRoundRect(-18, 3, 10, 14, 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.fillRect(-17, 4, 8, 10);
      // Wireframe on tablet
      ctx.strokeStyle = '#ff44cc40';
      ctx.lineWidth = 0.3;
      ctx.strokeRect(-16, 5, 6, 4);
      ctx.strokeRect(-14, 10, 4, 3);
      // "PIXEL PERFECT" text nearby (floating)
      break;

    case 'shurshik':
      // Clipboard
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(-18, 2, 10, 14);
      ctx.fillStyle = '#eee';
      ctx.fillRect(-17, 4, 8, 11);
      // BUG/FAIL text
      ctx.fillStyle = '#ff2244';
      ctx.font = '3px "Share Tech Mono"';
      ctx.fillText('BUG', -16, 8);
      ctx.fillStyle = '#ffaa00';
      ctx.fillText('FAIL', -16, 12);
      // Clip
      ctx.fillStyle = '#aaa';
      ctx.fillRect(-15, 1, 6, 3);
      break;

    case 'zamokrys':
      // Key
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(16, 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(16, 3, 8, 2);
      ctx.fillRect(22, 3, 2, 4);
      ctx.fillRect(20, 3, 2, 3);
      // OWASP badge
      ctx.fillStyle = '#ff2244';
      ctx.beginPath();
      ctx.arc(-16, -2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 4px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('O', -16, -1);
      ctx.textAlign = 'left';
      // Flash drives clipped to vest
      ctx.fillStyle = '#222';
      ctx.fillRect(-20, 6, 5, 4);
      ctx.fillStyle = '#00aaff';
      ctx.fillRect(-19, 7, 1.5, 1.5);
      ctx.fillStyle = '#222';
      ctx.fillRect(-20, 12, 5, 4);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-19, 13, 1.5, 1.5);
      // Lock symbol hanging
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(18, -2, 3, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = '#888';
      ctx.fillRect(15, -2, 6, 5);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(18, 0, 1.2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'nornik':
      // Wrench
      ctx.fillStyle = '#aaa';
      ctx.save();
      ctx.translate(15, 0);
      ctx.rotate(-0.3);
      // Handle
      ctx.fillRect(-2, -8, 4, 16);
      // Open end
      ctx.fillStyle = '#999';
      ctx.fillRect(-5, -10, 10, 4);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(-4, -8, 3, 3);
      ctx.fillRect(1, -8, 3, 3);
      // Closed end
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.arc(0, 8, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(0, 8, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Docker whale mascot icon
      ctx.fillStyle = '#0db7ed';
      ctx.save();
      ctx.translate(-16, -4);
      // Whale body
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.beginPath();
      ctx.moveTo(6, -2);
      ctx.lineTo(11, -6);
      ctx.lineTo(11, -1);
      ctx.closePath();
      ctx.fill();
      // Containers on whale's back
      ctx.fillStyle = '#fff';
      for (let c = 0; c < 3; c++) {
        ctx.fillRect(-4 + c * 3, -4, 2, 2);
        ctx.strokeStyle = '#0db7ed';
        ctx.lineWidth = 0.3;
        ctx.strokeRect(-4 + c * 3, -4, 2, 2);
      }
      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-4, 1, 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;

  'Обновляю зависимости', 'Профилирование памяти',
];

let demoStatusTimer = 0;
let demoIdleTimer   = 0;
let demoTokenTimer  = 0;

function initDemoMode() {
  const statuses = ['working', 'working', 'running', 'idle', 'sleeping', 'error',
                    'idle', 'working', 'idle', 'sleeping', 'idle'];
  agents.forEach((agent, idx) => {
    agent.status = statuses[idx % statuses.length];
    agent.task   = pick(SAMPLE_TASKS);
    const inBurrow = ['idle','done','sleeping','reserve','dead'].includes(agent.status);
    const pos = inBurrow ? getBurrowIdlePos(idx) : getOfficePos(agent.deskIdx);
    agent.x = pos.x; agent.y = pos.y;
    agent.targetX = pos.x; agent.targetY = pos.y;
    agent.idleActivity = inBurrow ? randInt(0, 13) : -1;
    if (agent.status === 'error') {
      agent.needsDoctor = true;
      agent.doctorTimer = rand(5, 10);
    }
  });
}

function updateDemoMode(dt) {
  demoStatusTimer += dt;
  demoIdleTimer   += dt;
  demoTokenTimer  += dt;
  tickerAddTimer  += dt;

  // Every 4s: one random agent changes status
  if (demoStatusTimer >= 4) {
    demoStatusTimer = 0;
    const idx = randInt(0, agents.length - 1);
    const agent = agents[idx];
    const nextStatus = pick(['working','running','idle','sleeping','done']);
    const prevStatus = agent.status;
    agent.status = nextStatus;
    agent.task   = pick(SAMPLE_TASKS);
    agent.updated_at = Date.now();
    const inBurrow = ['idle','done','sleeping'].includes(nextStatus);
    if (inBurrow) {
      const pos = getBurrowIdlePos(idx);
      agent.targetX = pos.x; agent.targetY = pos.y;
      agent.idleActivity = randInt(0, 13);
      agent.idleTimer = 0;
    } else {
      const pos = getOfficePos(agent.deskIdx);
      agent.targetX = pos.x; agent.targetY = pos.y;
      agent.idleActivity = -1;
    }
    // Random error chance
    if (Math.random() < 0.07) {
      agent.status = 'error';
      agent.needsDoctor = true;
      agent.doctorTimer = rand(5, 10);
      spawnParticle(agent.x, agent.y - 20, rand(-30, 30), rand(-50, -20), 2.5, '#ff2244', 8, 10, 'ERROR 500');
      spawnParticle(agent.x, agent.y - 20, rand(-30, 30), rand(-50, -20), 2.5, '#ffaa00', 8, 10, 'SEGFAULT');
    }
    // Random dead chance
    if (Math.random() < 0.02) {
      agent.status = 'dead';
      if (!ambulance.active) triggerAmbulance(idx);
    }
  }

  // Every 15s: idle agents get new activity
  if (demoIdleTimer >= 15) {
    demoIdleTimer = 0;
    agents.forEach(agent => {
      if (agent.status === 'idle' || agent.status === 'done') {
        agent.idleActivity = randInt(0, 13);
        agent.idleTimer = 0;
        agent.idleAnimT = 0;
      }
    });
  }

  // Every 30s: token drift
  if (demoTokenTimer >= 30) {
    demoTokenTimer = 0;
    agents.forEach(agent => {
      const delta = rand(0.01, 0.04) * agent.tokens_limit;
      agent.tokens_used = clamp(agent.tokens_used + delta, 0, agent.tokens_limit);
      agent.uptime_seconds += 30;
      if (Math.random() > 0.6) agent.commits++;
    });
    Object.keys(providerTokens).forEach(p => {
      providerTokens[p].used = clamp(providerTokens[p].used + rand(-0.03, 0.06), 0.05, 0.99);
    });
  }

  // Ticker refresh every 9s
  if (tickerAddTimer >= 9) {
    tickerAddTimer = 0;
    const msg = pick(TICKER_POOL);
    tickerText += '  ◆  ' + msg;
    if (tickerText.length > 800) tickerText = tickerText.slice(300);
  }

  // Move agents toward targets
  agents.forEach(agent => {
    const dx = agent.targetX - agent.x;
    const dy = agent.targetY - agent.y;
    const d  = Math.hypot(dx, dy);
    if (d > 2) {
      const speed = agent.status === 'running' ? 130 : 65;
      agent.x += (dx / d) * speed * dt;
      agent.y += (dy / d) * speed * dt;
      agent.facing = dx > 0 ? 1 : -1;
    }
    agent.idleAnimT += dt;
    agent.uptime_seconds += dt;
  });

  // Doctor trigger
  agents.forEach((agent, idx) => {
    if (agent.needsDoctor) {
      agent.doctorTimer -= dt;
      if (agent.doctorTimer <= 0 && !doctor.active) {
        triggerDoctor(idx);
        agent.needsDoctor = false;
      }
    }
  });

  // Easter egg timer
  cheeseClickTimer = Math.max(0, cheeseClickTimer - dt);
  if (cheeseClickTimer === 0) cheeseClicks = 0;
  if (easterEggActive) {
    easterEggTimer -= dt;
    agents.forEach(a => { a.danceT += dt; });
    if (easterEggTimer <= 0) {
      easterEggActive = false;
      agents.forEach(a => { a.isDancing = false; });
    }
  }
}

      const tilt = Math.sin(t * 7) * 0.35;
      ctx.save();
      ctx.translate(0, bob);
      ctx.rotate(tilt);
      drawRat(agent, 0, 0, Math.sin(t * 6) > 0 ? 1 : -1, 1.0);
      ctx.restore();
      // Music notes
      ['♪','♫','♩','♬'].forEach((note, i) => {
        const nt = (t * 0.9 + i * 0.6) % 3.5;
        ctx.globalAlpha = Math.max(0, 1 - nt / 3.5);
        ctx.fillStyle = ['#ff88ff','#88ffcc','#ffcc44','#44aaff'][i];
        ctx.font = `${10 + i * 2}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(note, 22 + Math.sin(nt * 2 + i) * 12, -22 - nt * 14 + bob);
        ctx.textAlign = 'left';
      });
      ctx.globalAlpha = 1;
      if (Math.sin(t * 11) > 0.6) {
        spawnParticle(agent.x + rand(-22, 22), agent.y - 8 + bob, rand(-35, 35), rand(-55, -20), 1, '#ff44cc', 2, 12, '★');
      }
      break;
    }

    case 8: { // 🐱 Лазерная указка — стебёт кота-тень
      drawRat(agent, 0, 0, 1, 0.9);
      const la = Math.sin(t * 1.8) * 0.9;
      ctx.strokeStyle = '#ff000080'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(12, -14);
      ctx.lineTo(12 + Math.cos(la) * 90, -14 + Math.sin(la) * 45);
      ctx.stroke();
      const ldx = 12 + Math.cos(la) * 90;
      const ldy = -14 + Math.sin(la) * 45;
      // Laser dot
      ctx.beginPath();
      ctx.arc(ldx, ldy, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#ff2200';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ldx, ldy, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#ff220040';
      ctx.fill();
      // Cat shadow chasing the dot
      const catOff = Math.sin(t * 1.8 - 0.4) * 90;
      ctx.save();
      ctx.translate(12 + catOff, -6 + Math.sin(t * 3.5) * 4);
      ctx.fillStyle = '#00000060';
      // cat body
      ctx.beginPath(); ctx.ellipse(0, 0, 9, 6, 0, 0, Math.PI * 2); ctx.fill();
      // cat head
      ctx.beginPath(); ctx.ellipse(10, -5, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
      // ears
      ctx.beginPath(); ctx.moveTo(7, -9); ctx.lineTo(11, -14); ctx.lineTo(14, -9); ctx.fill();
      ctx.beginPath(); ctx.moveTo(13, -8); ctx.lineTo(17, -13); ctx.lineTo(20, -8); ctx.fill();
      ctx.restore();
      // Rat laughing text
      if (Math.floor(t * 1.2) % 3 === 0) {
        ctx.fillStyle = '#ffff00'; ctx.font = '7px "Share Tech Mono"';
        ctx.textAlign = 'center'; ctx.fillText('кэхе', 0, -30); ctx.textAlign = 'left';
      }
      break;
    }

    case 9: { // 💊 Под одеялом
      // Blanket lump
      const blump = Math.sin(t * 2.5) * 3;
      ctx.fillStyle = '#3355aa';
      ctx.beginPath();
      ctx.ellipse(0, 5 + blump * 0.3, 22, 13 + blump, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2244880';
      ctx.beginPath();
      ctx.ellipse(0, 5 + blump * 0.3, 22, 13 + blump, 0, 0, Math.PI);
      ctx.fillStyle = '#4466cc';
      ctx.fill();
      // Small bump (head visible)
      ctx.fillStyle = '#c8a070';
      ctx.beginPath();
      ctx.arc(-14, -3 + blump * 0.5, 6, 0, Math.PI * 2); ctx.fill();
      // Eyes (closed)
      ctx.strokeStyle = '#3a2510'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-17, -4 + blump * 0.5); ctx.lineTo(-15, -3 + blump * 0.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-13, -4 + blump * 0.5); ctx.lineTo(-11, -3 + blump * 0.5); ctx.stroke();
      // Text bubbles ...→😅
      const stage9 = Math.floor(t * 0.5) % 4;
      const bubble9 = ['...', '...!', '💦', '😅'][stage9];
      ctx.fillStyle = '#ffffffcc'; ctx.font = '9px "Share Tech Mono"';
      ctx.textAlign = 'center'; ctx.fillText(bubble9, 12, -22); ctx.textAlign = 'left';
      break;
    }

    case 10: { // 🤢 Рыгает в углу
      drawRat(agent, -8, 0, 1, 0.85);
      // Heave animation
      const heave = Math.sin(t * 4) > 0.5;
      if (heave) {
        ctx.save(); ctx.translate(-8, 0); ctx.rotate(-0.2); ctx.restore();
      }
      // BUUUURP text cycling
      const burpStage = Math.floor(t * 0.7) % 5;
      if (burpStage < 3) {
        const burpSize = 6 + burpStage * 2;
        ctx.fillStyle = '#88ff44'; ctx.font = `bold ${burpSize}px "Share Tech Mono"`;
        ctx.textAlign = 'center';
        ctx.fillText('BUUUURP', 8 + burpStage * 2, -28 - burpStage * 5);
        ctx.textAlign = 'left';
      }
      // Puddle on floor
      const pudAmt = Math.min(1, t * 0.05);
      ctx.fillStyle = `rgba(100,200,50,${0.5 * pudAmt})`;
      ctx.beginPath(); ctx.ellipse(4, 14, 14 * pudAmt, 5 * pudAmt, 0, 0, Math.PI * 2); ctx.fill();
      // Green particles drip
      if (Math.sin(t * 5) > 0.7) {
        spawnParticle(agent.x - 2, agent.y - 5, rand(-5, 5), rand(10, 25), 0.8, '#88ff44', 3, 8, '●');
      }
      break;
    }

    case 11: { // 💩 За коробками
      // Boxes
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(-22, -10, 18, 22);
      ctx.fillStyle = '#a07820';
      ctx.fillRect(-22, -10, 18, 5);
      ctx.fillStyle = '#7a5c10';
      ctx.strokeStyle = '#5a3c00'; ctx.lineWidth = 1;
      ctx.strokeRect(-22, -10, 18, 22);
      // Rat peeking behind boxes (just eyes + ears)
      ctx.fillStyle = '#c8a070';
      ctx.beginPath(); ctx.arc(2, -5, 7, Math.PI * 0.5, Math.PI * 1.5); ctx.fill();
      // Eyes
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(1, -8, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(1, -3, 1.5, 0, Math.PI * 2); ctx.fill();
      // Newspaper
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-18, 5, 14, 10);
      ctx.fillStyle = '#999';
      ctx.font = '3px "Share Tech Mono"';
      ctx.fillText('====', -17, 10);
      ctx.fillText('====', -17, 14);
      // Gas cloud
      const gc = (t * 0.6) % 2;
      if (gc < 1.5) {
        ctx.globalAlpha = Math.max(0, 1 - gc / 1.5) * 0.5;
        ctx.fillStyle = '#aaff44';
        ctx.beginPath(); ctx.arc(12 + gc * 8, -2 + Math.sin(gc * 3) * 4, 6 + gc * 5, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      // Fly
      const flyX = Math.sin(t * 3.3) * 14;
      const flyY = -16 + Math.cos(t * 4.1) * 8;
      ctx.fillStyle = '#333';
      ctx.font = '8px serif';
      ctx.textAlign = 'center'; ctx.fillText('🪰', flyX, flyY); ctx.textAlign = 'left';
      break;
    }

    case 12: { // 📱 Тупит в телефон
      drawRat(agent, 0, 0, 1, 0.95);
      // Phone in paw
      ctx.fillStyle = '#222'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(10, -18, 12, 20, 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(11, -16, 10, 14);
      // Screen glow
      ctx.fillStyle = `rgba(100,180,255,${0.15 + Math.sin(t * 2) * 0.1})`;
      ctx.beginPath(); ctx.arc(16, -8, 14, 0, Math.PI * 2); ctx.fill();
      // Scroll gesture finger
      const scrollY = ((t * 30) % 14) - 7;
      ctx.fillStyle = '#c8a07088';
      ctx.beginPath(); ctx.arc(16, -9 + scrollY, 2.5, 0, Math.PI * 2); ctx.fill();
      // ХА ХА bubble
      if (Math.floor(t * 0.8) % 4 < 2) {
        ctx.fillStyle = '#ffff44'; ctx.font = 'bold 8px "Share Tech Mono"';
        ctx.textAlign = 'center'; ctx.fillText('ХА ХА', -8, -28); ctx.textAlign = 'left';
      }
      // Show phone to others
      const showPhase = Math.floor(t * 0.35) % 5;
      if (showPhase === 4) {
        ctx.save(); ctx.translate(0, 0); ctx.rotate(-0.6);
        ctx.fillStyle = '#222'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(16, -22, 12, 20, 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#88ccff'; ctx.fillRect(17, -20, 10, 14); ctx.restore();
        ctx.fillStyle = '#fff'; ctx.font = '6px "Share Tech Mono"';
        ctx.textAlign = 'center'; ctx.fillText('ГЛЯДИ!', 4, -32); ctx.textAlign = 'left';
      }
      break;
    }

    case 13: { // 💤 Спит стоя
      const fallPhase = Math.floor(t * 0.3) % 4; // 0=sway, 1=falling, 2=floor, 3=getup
      if (fallPhase === 0) {
        // Swaying
        const sway = Math.sin(t * 1.4) * 0.18;
        ctx.save(); ctx.rotate(sway);
        drawRat(agent, 0, 0, 1, 1.0);
        ctx.restore();
        // Zzz
        ['z','Z','Z'].forEach((z, i) => {
          const zt = (t * 0.7 + i * 0.9) % 2.7;
          ctx.globalAlpha = Math.max(0, 1 - zt / 2.7);
          ctx.fillStyle = '#aaddff'; ctx.font = `${7 + i * 3}px "Share Tech Mono"`;
          ctx.textAlign = 'center'; ctx.fillText(z, 14 + i * 5, -20 - zt * 12); ctx.textAlign = 'left';
        });
        ctx.globalAlpha = 1;
      } else if (fallPhase === 1) {
        // Falling — tilt
        const fallProg = ((t * 0.3) % 1) * 4 - 1; // 0..1
        ctx.save(); ctx.rotate(Math.min(1.5, fallProg * 1.8));
        drawRat(agent, 0, 0, 1, 1.0);
        ctx.restore();
      } else if (fallPhase === 2) {
        // On the floor
        ctx.save(); ctx.rotate(Math.PI * 0.5);
        drawRat(agent, 0, 0, 1, 1.0);
        ctx.restore();
        ctx.fillStyle = '#ffff00'; ctx.font = '10px serif';
        ctx.textAlign = 'center'; ctx.fillText('★', -12, -4); ctx.textAlign = 'left';
      } else {
        // Getting up
        const upProg = ((t * 0.3) % 1) * 4 - 3;
        ctx.save(); ctx.rotate(Math.max(0, (1 - upProg) * 1.5));
        drawRat(agent, 0, 0, 1, 1.0);
        ctx.restore();
      }
      break;
    }

    default:
      drawRat(agent, 0, 0, 1, 1.0);
      break;
  }
}

// ─── DOCTOR RAT NPC ───────────────────────────────────────────────────────────
function drawDoctor(ctx, x, y, t) {
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, 18, 14, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Body — white coat
  ctx.fillStyle = '#eef2ff';
  ctx.beginPath(); ctx.ellipse(0, 2, 11, 15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b0badd'; ctx.lineWidth = 0.8;
  ctx.stroke();

  // Coat buttons
  ctx.fillStyle = '#8899cc';
  [-4, 2, 8].forEach(yb => {
    ctx.beginPath(); ctx.arc(0, yb, 1, 0, Math.PI * 2); ctx.fill();
  });

  // Stethoscope
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-6, -6); ctx.quadraticCurveTo(-14, 2, -9, 10);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(-9, 11, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#888'; ctx.fill();

  // Clipboard in paw
  ctx.fillStyle = '#fff';
  ctx.fillRect(6, -4, 10, 13);
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5;
  ctx.strokeRect(6, -4, 10, 13);
  ctx.fillStyle = '#8899cc';
  ctx.fillRect(8, -1, 6, 1.5);
  ctx.fillRect(8, 3, 6, 1.5);
  ctx.fillRect(8, 7, 4, 1.5);

  // Head
  ctx.fillStyle = '#c8a070';
  ctx.beginPath(); ctx.arc(0, -18, 12, 0, Math.PI * 2); ctx.fill();

  // Doctor cap (mirror cap)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-10, -27, 20, 6);
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5; ctx.strokeRect(-10, -27, 20, 6);
  // Reflector disc
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.arc(0, -24, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.fillStyle = '#eee';
  ctx.beginPath(); ctx.arc(0, -24, 2, 0, Math.PI * 2); ctx.fill();

  // Ears
  ctx.fillStyle = '#b88060';
  ctx.beginPath(); ctx.arc(-13, -20, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(13, -20, 4, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -19, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -19, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.arc(-4, -19, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -19, 1.5, 0, Math.PI * 2); ctx.fill();
  // Pupils glint
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.2, -19.8, 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.8, -19.8, 0.5, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.fillStyle = '#d4746a';
  ctx.beginPath(); ctx.arc(0, -16, 2, 0, Math.PI * 2); ctx.fill();

  // Whiskers
  ctx.strokeStyle = '#9a7a5088'; ctx.lineWidth = 0.8;
  [[-12, -15], [-14, -17], [-12, -19]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(wx, wy); ctx.stroke();
  });
  [[12, -15], [14, -17], [12, -19]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(wx, wy); ctx.stroke();
  });

  // Legs / idle bob
  const bob = Math.sin(t * 1.5) * 1.5;
  ctx.fillStyle = '#dde4ff';
  ctx.beginPath(); ctx.ellipse(-5, 16 + bob, 4, 5, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 16 - bob, 4, 5, 0.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── AMBULANCE ANIMATION ──────────────────────────────────────────────────────
function drawAmbulance(ctx, state, t, canvasW, canvasH) {
  if (!state.ambulance) return;
  const amb = state.ambulance;

  // Drive in from right, stop at center, wait, drive out left
  const DRIVE_DUR = 2.0;
  const WAIT_DUR  = 3.5;
  const LEAVE_DUR = 2.0;
  const TOTAL     = DRIVE_DUR + WAIT_DUR + LEAVE_DUR;
  const elapsed   = (Date.now() - amb.startTime) / 1000;

  if (elapsed > TOTAL) {
    delete state.ambulance;
    return;
  }

  const cx = canvasW / 2;
  const cy = canvasH - 80;

  let ambX;
  if (elapsed < DRIVE_DUR) {
    // Drive in from right
    const prog = elapsed / DRIVE_DUR;
    ambX = canvasW + 90 - prog * (canvasW / 2 + 90);
  } else if (elapsed < DRIVE_DUR + WAIT_DUR) {
    ambX = cx;
  } else {
    // Drive out to left
    const prog = (elapsed - DRIVE_DUR - WAIT_DUR) / LEAVE_DUR;
    ambX = cx - prog * (cx + 90);
  }

  ctx.save();
  ctx.translate(ambX, cy);

  // Wheels
  ctx.fillStyle = '#333';
  [-38, 28].forEach(wx => {
    ctx.beginPath(); ctx.arc(wx, 22, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(wx, 22, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
  });

  // Body
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(-55, -30, 110, 50, 6); ctx.fill();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();

  // Red stripe
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(-55, -5, 110, 14);

  // Red cross
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(-8, -26, 16, 16);
  ctx.fillStyle = '#fff';
  ctx.fillRect(-3, -26, 6, 16);
  ctx.fillRect(-8, -22, 16, 6);

  // Windows
  ctx.fillStyle = '#88ccff99';
  ctx.beginPath(); ctx.roundRect(20, -26, 28, 16, 3); ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5; ctx.stroke();
  // Doctor silhouette in window
  ctx.fillStyle = '#ffffff88';
  ctx.beginPath(); ctx.ellipse(34, -18, 7, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Siren lights (flashing)
  const sirenFlash = Math.floor(t * 6) % 2;
  ctx.fillStyle = sirenFlash ? '#ff2200' : '#002299';
  ctx.beginPath(); ctx.roundRect(-50, -36, 14, 8, 3); ctx.fill();
  ctx.fillStyle = sirenFlash ? '#002299' : '#ff2200';
  ctx.beginPath(); ctx.roundRect(-34, -36, 14, 8, 3); ctx.fill();

  // Siren glow
  if (sirenFlash) {
    ctx.fillStyle = 'rgba(255,34,0,0.12)';
    ctx.beginPath(); ctx.arc(-43, -32, 30, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(0,34,200,0.12)';
    ctx.beginPath(); ctx.arc(-27, -32, 30, 0, Math.PI * 2); ctx.fill();
  }

  // СКОРАЯ text
  ctx.fillStyle = '#ee2222';
  ctx.font = 'bold 9px "Share Tech Mono"';
  ctx.textAlign = 'center'; ctx.fillText('СКОРАЯ', 0, 5); ctx.textAlign = 'left';

  // Bouncy suspension
  const bounce = Math.abs(Math.sin(t * 8)) * 2;
  ctx.translate(0, bounce);

  ctx.restore();
}
