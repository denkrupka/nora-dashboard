        ctx.textAlign = 'center';
        ctx.fillText('...блин', 15, -30);
        ctx.textAlign = 'left';
        // Sad face drooping
        ctx.fillStyle = '#88aaff';
        ctx.beginPath();
        ctx.arc(8, -6, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    default:
      drawRat(agent, 0, 0, 1, 1.50);
      break;
  }

  ctx.restore(); // ← FIX: balance the ctx.save()+translate at top of drawIdleActivity
}

// ─── DOCTOR RAT NPC ───────────────────────────────────────────────────────────
function drawDoctor(ctx, x, y, t) {
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, 18, 14, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Body — white coat
  ctx.fillStyle = '#eef2ff';
  ctx.beginPath(); ctx.ellipse(0, 2, 11, 15, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b0badd'; ctx.lineWidth = 0.8;
  ctx.stroke();

  // Coat buttons
  ctx.fillStyle = '#8899cc';
  [-4, 2, 8].forEach(yb => {
    ctx.beginPath(); ctx.arc(0, yb, 1, 0, Math.PI * 2); ctx.fill();
  });

  // Stethoscope
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-6, -6); ctx.quadraticCurveTo(-14, 2, -9, 10);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(-9, 11, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#888'; ctx.fill();

  // GIANT syringe (3× head size) with injection animation
  ctx.save();
  ctx.translate(8, -8);
  ctx.rotate(-0.4 + Math.sin(t * 2.2) * 0.18); // inject oscillation

  // Barrel (translucent)
  ctx.fillStyle = 'rgba(200, 230, 255, 0.85)';
  ctx.strokeStyle = '#8899cc'; ctx.lineWidth = 1;
  ctx.fillRect(-5, -18, 10, 30);
  ctx.strokeRect(-5, -18, 10, 30);

  // Measurement marks on barrel
  ctx.strokeStyle = '#8899cc'; ctx.lineWidth = 0.5;
  for (let m = 0; m < 5; m++) {
    ctx.beginPath();
    ctx.moveTo(-5, -14 + m * 5);
    ctx.lineTo(-2, -14 + m * 5);
    ctx.stroke();
  }

  // Liquid inside (green serum, shifts as plunger moves)
  const plungerY = -12 + Math.sin(t * 2.2) * 4;
  ctx.fillStyle = 'rgba(0, 255, 120, 0.6)';
  ctx.fillRect(-3.5, plungerY + 4, 7, 10);

  // Plunger disc
  ctx.fillStyle = '#cc3333';
  ctx.fillRect(-6, plungerY, 12, 4);
  // Plunger rod
  ctx.fillStyle = '#aa2222';
  ctx.fillRect(-1.5, plungerY - 12, 3, 13);
  // Handle crossbar
  ctx.fillRect(-7, plungerY - 14, 14, 3);

  // End cap + flange
  ctx.fillStyle = '#8899cc';
  ctx.fillRect(-5, 12, 10, 5);
  ctx.fillRect(-7, 11, 14, 3);

  // Needle (long, pointy)
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(-0.7, 17, 1.4, 16);
  // Needle tip (triangle)
  ctx.beginPath();
  ctx.moveTo(-0.7, 33);
  ctx.lineTo(0.7, 33);
  ctx.lineTo(0, 38);
  ctx.closePath();
  ctx.fill();
  // Needle glint
  ctx.strokeStyle = '#ffffff80'; ctx.lineWidth = 0.4;
  ctx.beginPath();
  ctx.moveTo(-0.2, 17); ctx.lineTo(-0.2, 36);
  ctx.stroke();

  // Drop at needle tip (green)
  if (Math.sin(t * 2.2) > 0.5) {
    ctx.fillStyle = 'rgba(0, 255, 120, 0.8)';
    ctx.beginPath();
    ctx.arc(0, 40, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Head
  ctx.fillStyle = '#c8a070';
  ctx.beginPath(); ctx.arc(0, -18, 12, 0, Math.PI * 2); ctx.fill();

  // Doctor cap (mirror cap)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-10, -27, 20, 6);
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5; ctx.strokeRect(-10, -27, 20, 6);
  // Reflector disc
  ctx.fillStyle = '#ddd';
  ctx.beginPath(); ctx.arc(0, -24, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5; ctx.stroke();
  ctx.fillStyle = '#eee';
  ctx.beginPath(); ctx.arc(0, -24, 2, 0, Math.PI * 2); ctx.fill();

  // Ears
  ctx.fillStyle = '#b88060';
  ctx.beginPath(); ctx.arc(-13, -20, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(13, -20, 4, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4, -19, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -19, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a2510';
  ctx.beginPath(); ctx.arc(-4, -19, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -19, 1.5, 0, Math.PI * 2); ctx.fill();
  // Pupils glint
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.2, -19.8, 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.8, -19.8, 0.5, 0, Math.PI * 2); ctx.fill();

  // Nose
  ctx.fillStyle = '#d4746a';
  ctx.beginPath(); ctx.arc(0, -16, 2, 0, Math.PI * 2); ctx.fill();

  // Whiskers
  ctx.strokeStyle = '#9a7a5088'; ctx.lineWidth = 0.8;
  [[-12, -15], [-14, -17], [-12, -19]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(wx, wy); ctx.stroke();
  });
  [[12, -15], [14, -17], [12, -19]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(wx, wy); ctx.stroke();
  });

  // Legs / idle bob
  const bob = Math.sin(t * 1.5) * 1.5;
  ctx.fillStyle = '#dde4ff';
  ctx.beginPath(); ctx.ellipse(-5, 16 + bob, 4, 5, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 16 - bob, 4, 5, 0.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── AMBULANCE ANIMATION ──────────────────────────────────────────────────────
function drawAmbulance(ctx, state, t, canvasW, canvasH) {
  if (!state.ambulance) return;
  const amb = state.ambulance;

  // Drive in from right, stop at center, wait, drive out left
  const DRIVE_DUR = 2.0;
  const WAIT_DUR  = 3.5;
  const LEAVE_DUR = 2.0;
  const TOTAL     = DRIVE_DUR + WAIT_DUR + LEAVE_DUR;
  const elapsed   = (Date.now() - amb.startTime) / 1000;

  if (elapsed > TOTAL) {
    delete state.ambulance;
    return;
  }

  const cx = canvasW / 2;
  const cy = canvasH - 80;

  let ambX;
  if (elapsed < DRIVE_DUR) {
    // Drive in from right
    const prog = elapsed / DRIVE_DUR;
    ambX = canvasW + 90 - prog * (canvasW / 2 + 90);
  } else if (elapsed < DRIVE_DUR + WAIT_DUR) {
    ambX = cx;
  } else {
    // Drive out to left
    const prog = (elapsed - DRIVE_DUR - WAIT_DUR) / LEAVE_DUR;
    ambX = cx - prog * (cx + 90);
  }

  ctx.save();
  ctx.translate(ambX, cy);

  // Wheels
  ctx.fillStyle = '#333';
  [-38, 28].forEach(wx => {
    ctx.beginPath(); ctx.arc(wx, 22, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(wx, 22, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
  });

  // Body
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath(); ctx.roundRect(-55, -30, 110, 50, 6); ctx.fill();
  ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();

  // Red stripe
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(-55, -5, 110, 14);

  // Red cross
  ctx.fillStyle = '#ee2222';
  ctx.fillRect(-8, -26, 16, 16);
  ctx.fillStyle = '#fff';
  ctx.fillRect(-3, -26, 6, 16);
  ctx.fillRect(-8, -22, 16, 6);

  // Windows
  ctx.fillStyle = '#88ccff99';
  ctx.beginPath(); ctx.roundRect(20, -26, 28, 16, 3); ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 0.5; ctx.stroke();
  // Doctor silhouette in window
  ctx.fillStyle = '#ffffff88';
  ctx.beginPath(); ctx.ellipse(34, -18, 7, 9, 0, 0, Math.PI * 2); ctx.fill();

  // Siren lights (flashing)
  const sirenFlash = Math.floor(t * 6) % 2;
  ctx.fillStyle = sirenFlash ? '#ff2200' : '#002299';
  ctx.beginPath(); ctx.roundRect(-50, -36, 14, 8, 3); ctx.fill();
  ctx.fillStyle = sirenFlash ? '#002299' : '#ff2200';
  ctx.beginPath(); ctx.roundRect(-34, -36, 14, 8, 3); ctx.fill();

  // Siren glow
  if (sirenFlash) {
    ctx.fillStyle = 'rgba(255,34,0,0.12)';
    ctx.beginPath(); ctx.arc(-43, -32, 30, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(0,34,200,0.12)';
    ctx.beginPath(); ctx.arc(-27, -32, 30, 0, Math.PI * 2); ctx.fill();
  }

  // СКОРАЯ text
  ctx.fillStyle = '#ee2222';
  ctx.font = 'bold 9px "Share Tech Mono"';
  ctx.textAlign = 'center'; ctx.fillText('СКОРАЯ', 0, 5); ctx.textAlign = 'left';

  // Bouncy suspension
  const bounce = Math.abs(Math.sin(t * 8)) * 2;
  ctx.translate(0, bounce);

  ctx.restore();
}

// DRAW HEADER UI
// ============================================================
function drawHeader(ctx, w, h) {
  const HH = 58;
  const t = performance.now() / 1000;

  // Panel background
  ctx.fillStyle = 'rgba(0,20,10,0.92)';
  ctx.fillRect(0, 0, w, HH);

  // Bottom border glow
  const borderGrad = ctx.createLinearGradient(0, HH - 1, w, HH - 1);
  borderGrad.addColorStop(0,   'rgba(0,255,136,0)');
  borderGrad.addColorStop(0.3, 'rgba(0,255,136,0.5)');
  borderGrad.addColorStop(0.7, 'rgba(0,255,136,0.5)');
  borderGrad.addColorStop(1,   'rgba(0,255,136,0)');
  ctx.fillStyle = borderGrad;
  ctx.fillRect(0, HH - 1, w, 1);

  // === LOGO ===
  const logoGlow = 0.65 + Math.sin(t * 2.3) * 0.35;
  ctx.save();
  ctx.font = "bold 17px 'Orbitron', sans-serif";
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = Math.round(20 * logoGlow);
  ctx.fillStyle = `rgba(0,${Math.round(200 + 55 * logoGlow)},${Math.round(80 + 56 * logoGlow)},1)`;
  ctx.fillText('🐀 КРЫСИНАЯ НОРА', 14, HH / 2);
  ctx.restore();

  // === STATUS COUNTERS ===
  const counts = { working: 0, running: 0, idle: 0, sleeping: 0, done: 0, error: 0, dead: 0 };
  agents.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });
  const active = counts.working + counts.running;

  const badges = [
    { emoji: '⚡', text: `${active} РАБОТАЮТ`,   color: '#00ff88' },
    { emoji: '🧀', text: `${counts.idle + counts.done} ЖУЮТ`,      color: '#ffaa00' },
    { emoji: '💤', text: `${counts.sleeping} СПЯТ`,       color: '#4488ff' },
    { emoji: '💀', text: `${counts.dead} УПАЛИ`,       color: '#ff2244' },
  ];

  let bx = 252;
  badges.forEach(b => {
    ctx.font = "11px 'Share Tech Mono', monospace";
    ctx.textBaseline = 'middle';
    const label = `${b.emoji} ${b.text}`;
    const tw = ctx.measureText(label).width + 16;

    // Badge background
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    drawRoundRect(bx, (HH - 24) / 2, tw, 24, 4);
    ctx.fill();
    ctx.strokeStyle = b.color + '50';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Badge text
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 5;
    ctx.fillStyle = b.color;
    ctx.fillText(label, bx + 8, HH / 2);
    ctx.restore();

    bx += tw + 6;
  });

  // === PROVIDER TOKEN METERS ===
  const providers = ['anthropic', 'openai', 'gemini', 'elevenlabs', 'vapi'];
  const labels    = ['ANTHROPIC', 'OPENAI', 'GEMINI', '11LABS',     'VAPI' ];
  const mW = 56, mH = 7, mGap = 74;
  let mx = w - providers.length * mGap - 64;

  providers.forEach((p, i) => {
    const data  = providerTokens[p];
    const color = PROVIDER_COLORS[p];
    const used  = clamp(data.used, 0, 1);
    const cx    = mx + mW / 2;

    // Provider label
    ctx.font = "8px 'Share Tech Mono', monospace";
    ctx.fillStyle = color + 'aa';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], cx, HH / 2 - 11);

    // Bar track
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    drawRoundRect(mx, HH / 2 - 3, mW, mH, 2);
    ctx.fill();

    // Bar fill (warn colours)
    const fillCol = used > 0.85 ? '#ff2244' : used > 0.65 ? '#ffaa00' : color;
    ctx.save();
    ctx.shadowColor = fillCol;
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = fillCol;
    const fw = Math.max(3, mW * used);
    drawRoundRect(mx, HH / 2 - 3, fw, mH, 2);
    ctx.fill();
    ctx.restore();

    // Percent
    ctx.font = "7px 'Share Tech Mono', monospace";
    ctx.fillStyle = '#ffffff55';
    ctx.fillText(`${Math.round(used * 100)}%`, cx, HH / 2 + 12);

    mx += mGap;
  });

  // === LIVE DOT ===
  const isConn  = true; // demo always "connected"
  const pulse   = 0.6 + Math.sin(t * 3.1) * 0.4;
  const dotCol  = DEMO_MODE ? '#ffaa00' : (isConn ? '#00ff88' : '#ff2244');
  const dotX    = w - 30;
  const dotY    = HH / 2;

  // Outer ring
  ctx.beginPath();
  ctx.arc(dotX, dotY, 5 + pulse * 5, 0, Math.PI * 2);
  ctx.strokeStyle = dotCol + '50';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Dot
  ctx.save();
  ctx.shadowColor = dotCol;
  ctx.shadowBlur  = 14 * pulse;
  ctx.fillStyle   = dotCol;
  ctx.beginPath();
  ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.font = "9px 'Share Tech Mono', monospace";
  ctx.fillStyle = dotCol;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(DEMO_MODE ? 'DEMO MODE' : (isConn ? 'LIVE' : 'OFFLINE'), dotX - 12, dotY);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawTicker(ctx, w, h, t) {
  const TH = 28;
  const ty = h - TH;

  // Strip background
  ctx.fillStyle = 'rgba(0,10,5,0.90)';
  ctx.fillRect(0, ty, w, TH);

  // Top border
  const tGrad = ctx.createLinearGradient(0, ty, w, ty);
  tGrad.addColorStop(0,   'rgba(0,255,136,0)');
  tGrad.addColorStop(0.2, 'rgba(0,255,136,0.25)');
  tGrad.addColorStop(0.8, 'rgba(0,255,136,0.25)');
  tGrad.addColorStop(1,   'rgba(0,255,136,0)');
  ctx.fillStyle = tGrad;
  ctx.fillRect(0, ty, w, 1);

  // Clip to ticker area
  ctx.save();
  ctx.beginPath();
  ctx.rect(72, ty, w - 72, TH);
  ctx.clip();

  ctx.font = "11px 'Share Tech Mono', monospace";
  const fullText = tickerText;
  const tw = ctx.measureText(fullText).width;

  // Scroll offset updated in render loop
  const drawX = 72 + (w - 72) - tickerOffset;

  ctx.save();
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur  = 8;
  ctx.fillStyle   = '#00cc66';
  ctx.textAlign   = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(fullText, drawX, ty + TH / 2);
  // Second copy for seamless loop
  ctx.fillText(fullText, drawX + tw + 60, ty + TH / 2);
  ctx.restore();

  ctx.restore(); // unclip

  // "НОРА LIVE" label badge
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(0, ty, 70, TH);
  ctx.save();
  ctx.font = "bold 8px 'Orbitron', sans-serif";
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('НОРА LIVE', 35, ty + TH / 2);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
}

// ============================================================
// SUPABASE REALTIME (DEMO_MODE = false)
// ============================================================
let supabaseClient   = null;
let supabasePollId   = null;

function applyAgentRow(row) {
  if (!row || !row.id) return;
  const ag = agents.find(a => a.def.id === row.id);
  if (!ag) return;
  if (row.status)       ag.status       = row.status;
  if (row.task)         ag.task         = row.task;
  if (row.tokens_used != null) ag.tokens_used = row.tokens_used;
  if (row.commits != null)     ag.commits     = row.commits;
  ag.updated_at = row.updated_at ? new Date(row.updated_at).getTime() : Date.now();
}

function startSupabasePoll() {
  if (supabasePollId) return;
  supabasePollId = setInterval(async () => {
    if (!supabaseClient) return;
    try {
      const { data: agRows } = await supabaseClient.from('agent_status').select('*');
      if (agRows) agRows.forEach(applyAgentRow);
      const { data: tkRows } = await supabaseClient.from('provider_tokens').select('*');
      if (tkRows) tkRows.forEach(row => {
        if (providerTokens[row.provider])
          providerTokens[row.provider].used = clamp(row.used_ratio, 0, 1);
      });
    } catch (e) { console.warn('[НОРА] Supabase poll error:', e); }
  }, 30000);
}

function initSupabase() {
  if (typeof supabase === 'undefined') {
    console.warn('[НОРА] Supabase SDK unavailable — using poll fallback');
    startSupabasePoll();
    return;
  }
  try {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    supabaseClient
      .channel('nora-agent-status')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'agent_status' },
          pl => applyAgentRow(pl.new))
      .subscribe(st => {
        if (st === 'SUBSCRIBED') console.log('[НОРА] Realtime: agent_status OK');
      });

    supabaseClient
      .channel('nora-provider-tokens')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'provider_tokens' },
          pl => {
            const r = pl.new;
            if (r && providerTokens[r.provider])
              providerTokens[r.provider].used = clamp(r.used_ratio, 0, 1);
          })
      .subscribe();

    // Task flow packets (realtime task transfers between agents)
    supabaseClient
      .channel('task_flow')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'task_flow' },
          (payload) => {
            const { from_agent, to_agent, task_type } = payload.new;
            spawnPacket(from_agent, to_agent, task_type || 'task');
          })
      .subscribe();

    startSupabasePoll(); // 30s fallback alongside realtime
  } catch (err) {
    console.error('[НОРА] Supabase init failed:', err);
    startSupabasePoll();
  }
}

// ============================================================
// EASTER EGG — CHEESE CLICKS
// ============================================================
function handleCheeseClick() {
  cheeseClicks++;
  cheeseClickTimer = 5; // 5-sec window to get 3 clicks
  if (cheeseClicks >= 3) {
    cheeseClicks    = 0;
    cheeseClickTimer = 0;
    easterEggActive = true;
    easterEggTimer  = 5;
    agents.forEach(a => { a.isDancing = true; a.danceT = 0; });
    const bp = getBurrowPositions();
    for (let i = 0; i < 40; i++) {
      spawnParticle(
        bp.cheese.x, bp.cheese.y,
        rand(-90, 90), rand(-110, -20), 2.8,
        pick(['#ffcc00','#ff88ff','#00ffcc','#ff4444','#ffffff']),
        rand(3, 7), 18, pick(['★','✦','◆','♪'])
      );
    }
    addFloatingText(W * 0.75, H * 0.45, '🎉 ТАНЦУЮТ ВСЕ!', '#ffcc00', 22);
  }
}

// ============================================================
// CANVAS CLICK HANDLER
// ============================================================
function handleCanvasClick(e) {
  const rect  = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX / DPR;
  const my = (e.clientY - rect.top)  * scaleY / DPR;

  // Cheese easter egg (click on cheese in burrow)
  const bp = getBurrowPositions();
  if (dist(mx, my, bp.cheese.x, bp.cheese.y) < 28) {
    handleCheeseClick();
    return;
  }

  // Agent click — find closest within 44px
  let best  = null;
  let bestD = 44;
  agents.forEach(ag => {
    const d = dist(mx, my, ag.x, ag.y);
    if (d < bestD) { bestD = d; best = ag; }
  });
  if (best) showPopup(best);
  else       hidePopup();
}

// ============================================================
// MAIN RENDER LOOP
// ============================================================
function render(timestamp) {
  requestAnimationFrame(render);

  // Delta time (capped at 100ms to avoid spiral of death)
  if (!lastTime) lastTime = timestamp;
  deltaTime = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime  = timestamp;
  frameCount++;

  // Update simulation
  if (DEMO_MODE) updateDemoMode(deltaTime);

  // Advance ticker scroll
  tickerOffset += 55 * deltaTime;
  ctx.font = "11px 'Share Tech Mono', monospace";
  const fullTickerW = ctx.measureText(tickerText).width;
  if (tickerOffset > fullTickerW + 80) tickerOffset = 0;

  // ── CLEAR ────────────────────────────────────────────────
  ctx.clearRect(0, 0, W, H);

  // ── BACKGROUNDS ──────────────────────────────────────────
  drawBackground();
  drawWallHole();

  // ── SCENE DECORATIONS ────────────────────────────────────
  drawOfficeDecorations();
  drawBurrowDecorations();

  // ── AGENTS ───────────────────────────────────────────────
  // Z-depth sort: agents with higher Y (closer to camera) render on top
  const sortedAgents = [...agents].sort((a, b) => a.y - b.y);
  sortedAgents.forEach((agent, idx) => {
    // ── DEAD — draw in burrow near wall, grey tint, flies, halo ──
    if (agent.status === 'dead') {
      const bp = getBurrowPositions();
      // Position near burrow wall if not already placed
      const deadX = agent.x || (bp.couch.x + 30 + (agents.indexOf(agent) % 5) * 28);
      const deadY = agent.y || (H * 0.78);
      const deadT = performance.now() / 1000;

      ctx.save();
      ctx.translate(deadX, deadY);

      // Red blinking outline
      if (Math.sin(deadT * 3) > 0) {
        ctx.save();
        ctx.shadowColor = '#ff2244';
        ctx.shadowBlur = 18;
        ctx.strokeStyle = '#ff2244';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // Grey tint overlay — draw rat rotated (dead on floor)
      ctx.save();
      ctx.rotate(Math.PI / 2);
      ctx.filter = 'grayscale(100%) brightness(0.5)';
      drawRat(agent, 0, 0, 1, 1.28);
      ctx.filter = 'none';
      ctx.restore();

      // Angel halo (blinking)
      const haloAlpha = 0.5 + Math.sin(deadT * 2) * 0.5;
      ctx.save();
      ctx.globalAlpha = haloAlpha;
      ctx.strokeStyle = '#ffffaa';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#ffffaa';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(0, -28, 9, 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();

      // Flies circling (2-3 dots)
      for (let f = 0; f < 3; f++) {
        const fa = deadT * 2.5 + f * (Math.PI * 2 / 3);
        const fr = 18 + Math.sin(deadT * 3 + f) * 4;
        const fx = Math.cos(fa) * fr;
        const fy = Math.sin(fa) * fr * 0.5 - 8;
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(fx, fy, 2, 0, Math.PI * 2);
        ctx.fill();
        // Wing dots
        ctx.fillStyle = '#55555580';
        ctx.beginPath();
        ctx.arc(fx - 2.5, fy - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(fx + 2.5, fy - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Name label
      ctx.font = "9px 'Share Tech Mono', monospace";
      ctx.fillStyle = '#44000080';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(agent.def.name, 0, -42);
      ctx.textBaseline = 'alphabetic';
      ctx.restore();
      return;
    }

    const inBurrow = ['idle', 'done', 'sleeping', 'reserve'].includes(agent.status);

    // ── WAKE-UP BOUNCE (sleeping → другой статус) ──
    const nowSec = performance.now() / 1000;
    let wakeScale = 1;
    if (agent.wakeUpBounceStart) {
      const wakeElapsed = nowSec - agent.wakeUpBounceStart;
      const wakeDur = 0.3;
      if (wakeElapsed < wakeDur) {
        wakeScale = 1 + 0.3 * Math.sin((wakeElapsed / wakeDur) * Math.PI);
      } else {
        agent.wakeUpBounceStart = null; // bounce завершён
      }
    }
    if (wakeScale !== 1) {
      ctx.save();
      ctx.translate(agent.x, agent.y);
      ctx.scale(wakeScale, wakeScale);
      ctx.translate(-agent.x, -agent.y);
    }

    if (easterEggActive || agent.isDancing) {
      // ── DANCE ANIMATION ──
      ctx.save();
      ctx.translate(agent.x, agent.y);
      const dBob  = Math.sin(agent.danceT * 9)  * 5;
      const dTilt = Math.sin(agent.danceT * 7)  * 0.38;
      ctx.save();
      ctx.translate(0, dBob);
      ctx.rotate(dTilt);
      drawRat(agent, 0, 0, Math.sin(agent.danceT * 6) > 0 ? 1 : -1, 1.50);
      ctx.restore();
      // Music notes
      ['♪','♫','♩','♬'].forEach((note, ni) => {
        const nt = (agent.danceT * 0.9 + ni * 0.6) % 3.5;
        ctx.globalAlpha = Math.max(0, 1 - nt / 3.5);
        ctx.fillStyle = ['#ff88ff','#88ffcc','#ffcc44','#44aaff'][ni];
        ctx.font = `${10 + ni * 2}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(note, 22 + Math.sin(nt * 2 + ni) * 12, -22 - nt * 14 + dBob);
        ctx.textAlign = 'left';
      });
      ctx.globalAlpha = 1;
      ctx.restore();

    } else if (agent.status === 'sleeping') {
      // ── SLEEPING — лежит на кровати, ZZZ летят ──
      ctx.save();
      ctx.translate(agent.x, agent.y + 8);
      ctx.rotate(Math.PI / 2); // лежит на боку
      drawRat(agent, 0, 0, 1, 1.35);
      ctx.restore();
      // Одеяло
      ctx.save();
      ctx.translate(agent.x, agent.y + 12);
      ctx.fillStyle = '#3355aa';
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.roundRect(-16, -6, 32, 12, 5); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
      // Лапа свешивается с края одеяла
      ctx.save();
      ctx.translate(agent.x, agent.y + 12);
      const sleepPawT = performance.now() / 1000;
      const pawSwing  = Math.sin(sleepPawT * 0.8) * 1.5;
      ctx.fillStyle = '#c8a070';
      ctx.beginPath();
      ctx.ellipse(14, 8 + pawSwing, 4, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // ZZZ летят вверх
      const sleepT = performance.now() / 1000;
      ['Z', 'Z', 'Z'].forEach((z, zi) => {
        const zt = ((sleepT * 0.6 + zi * 0.9) % 2.5);
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - zt / 2.5);
        ctx.fillStyle = '#88ccff';
        ctx.font = `bold ${8 + zi * 3}px "Share Tech Mono"`;
        ctx.textAlign = 'center';
        ctx.fillText(z, agent.x + 18 + zi * 6, agent.y - 10 - zt * 20);
        ctx.globalAlpha = 1;
        ctx.restore();
      });

    } else if (agent.status === 'error') {
      // ── ERROR — лежит на полу, X_X глаза, красные ошибки ──
      ctx.save();
      ctx.translate(agent.x, agent.y + 6);
      ctx.rotate(Math.PI / 2); // лежит
      // Рисуем крысу с X_X глазами
      drawRat(agent, 0, 0, 1, 1.35);
      // Перекрываем глаза крестиками
      ctx.strokeStyle = '#ff2244';
      ctx.lineWidth = 2;
      [[-2, -15], [2, -15]].forEach(([ex, ey]) => {
        ctx.beginPath(); ctx.moveTo(ex - 3, ey - 3); ctx.lineTo(ex + 3, ey + 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex + 3, ey - 3); ctx.lineTo(ex - 3, ey + 3); ctx.stroke();
      });
      ctx.restore();

    } else if (inBurrow && agent.idleActivity >= 0) {
      // drawIdleActivity handles its own ctx.translate(agent.x, agent.y)
      drawIdleActivity(agent);

    } else {
      // ── WORKING / RUNNING in office ──
      const wt = performance.now() / 1000;
      const isRunning = agent.status === 'running';
      const bobSpeed = isRunning ? 7 : 3.5;
      const bobAmt   = isRunning ? 2.5 : 1.2;
      const bob = Math.sin(wt * bobSpeed + agent.blinkOffset) * bobAmt;
      // Paw tap offset (alternate hands typing)
      const pawL = Math.max(0, Math.sin(wt * bobSpeed + agent.blinkOffset)) * (isRunning ? 3 : 1.5);
      const pawR = Math.max(0, Math.sin(wt * bobSpeed + agent.blinkOffset + Math.PI)) * (isRunning ? 3 : 1.5);

      ctx.save();
      ctx.translate(agent.x, agent.y);
      // Lean forward toward monitor slightly
      ctx.translate(3, bob);
      ctx.rotate(0.08);
      drawRat(agent, 0, 0, agent.facing, 1.50);
      ctx.restore();

      // Spark particles above desk (periodic)
      agent.sparkTimer = (agent.sparkTimer || 0) - deltaTime;
      if (agent.sparkTimer <= 0) {
        agent.sparkTimer = isRunning ? 0.7 : 2.0;
        const sparkCount = isRunning ? 3 : 1;
        const sparkColor = isRunning ? '#00e5ff' : '#00ff88';
        for (let s = 0; s < sparkCount; s++) {
          spawnParticle(
            agent.x + rand(-18, 18), agent.y - 32,
            rand(-25, 25), rand(-45, -15),
            isRunning ? 0.6 : 0.9,
            sparkColor, isRunning ? 2.5 : 2, 8,
            pick(['✦', '⚡', '·'])
          );
        }
      }
    }

    if (wakeScale !== 1) ctx.restore(); // закрыть wake-up scale

    // ── STATUS DOT ──
    const sc = COLORS[agent.status] || '#888';
    ctx.save();
    ctx.translate(agent.x, agent.y);
    ctx.shadowColor = sc;
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = sc;
    ctx.beginPath();
    ctx.arc(0, -40, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // ── NAME LABEL ──
    ctx.font = "9px 'Share Tech Mono', monospace";
    ctx.fillStyle    = '#ffffff80';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(agent.def.name, 0, -46);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();

    // ── ERROR PARTICLES + MONITOR BLINK ──
    if (agent.status === 'error') {
      agent.errorParticleTimer -= deltaTime;
      if (agent.errorParticleTimer <= 0) {
        agent.errorParticleTimer = 0.4;
        const errMsgs = ['ERROR 500', 'NULL POINTER', 'SEGFAULT'];
        const msg = errMsgs[Math.floor(Math.random() * errMsgs.length)];
        spawnParticle(agent.x + rand(-12, 12), agent.y - 20,
          rand(-22, 22), rand(-60, -20), 2.0, '#ff2244', 2, 10, msg);
      }
      // Монитор мигает красным (если агент в офисе, т.е. есть стол)
      if (!['idle','done','sleeping','reserve'].includes(agent.status)) {
        const monFlash = (Math.sin(performance.now() / 120) > 0);
        if (monFlash) {
          ctx.save();
          ctx.translate(agent.x + 22, agent.y - 28);
          ctx.fillStyle = 'rgba(255,34,68,0.55)';
          ctx.shadowColor = '#ff2244';
          ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.roundRect(-11, -8, 22, 16, 3); ctx.fill();
          ctx.shadowBlur = 0;
          ctx.restore();
        }
      }
    }
  });

  // ── DOCTOR NPC ───────────────────────────────────────────
  if (doctor.active) {
    doctor.t += deltaTime;
    const tgt = doctor.targetAgentIdx >= 0 ? agents[doctor.targetAgentIdx] : null;

    if (doctor.phase === 'running-in') {
      if (tgt) {
        const dx = (tgt.x - 45) - doctor.x;
        if (Math.abs(dx) > 4) {
          doctor.x += Math.sign(dx) * 160 * deltaTime;
          doctor.y  = tgt.y;
        } else {
          doctor.phase    = 'treating';
          doctor.healTimer = 3.5;
        }
      }
    } else if (doctor.phase === 'treating') {
      doctor.healTimer -= deltaTime;
      if (doctor.healTimer <= 0 && tgt) {
        const prev = tgt.status;
        tgt.status    = prev === 'dead' ? 'dead' : 'idle';
        tgt.needsDoctor = false;
        addFloatingText(tgt.x, tgt.y - 36, '+HP 💉', '#00ff88', 15);
        spawnParticle(tgt.x, tgt.y - 20, rand(-30, 30), rand(-60, -20), 2, '#00ff88', 3, 10, '+');
        // Переместить в нору и назначить idleActivity
        if (tgt.status === 'idle') {
          const healIdx = doctor.targetAgentIdx;
          const pos = getBurrowIdlePos(healIdx);
          tgt.targetX = pos.x; tgt.targetY = pos.y;
          tgt.idleActivity = randInt(0, 16);
          tgt.idleTimer = 0; tgt.idleAnimT = 0;
        }
        doctor.phase = 'running-out';
      }
    } else if (doctor.phase === 'running-out') {
      doctor.x -= 190 * deltaTime;
      if (doctor.x < -90) {
        doctor.active = false;
        doctor.phase  = 'idle';
        doctor.targetAgentIdx = -1;
      }
    }

    drawDoctor(ctx, doctor.x, doctor.y - 22, doctor.t);
  }

  // ── AMBULANCE ────────────────────────────────────────────
  if (ambulance.active) {
    ambulance.t += deltaTime;
    const ambState = { ambulance: { startTime: ambulance.startTime } };
    drawAmbulance(ctx, ambState, ambulance.t, W, H);
    if (!ambState.ambulance) {
      // Ambulance drove away — resurrect agent
      ambulance.active = false;
      ambulance.phase  = 'idle';
      const revived = ambulance.targetAgentIdx >= 0 ? agents[ambulance.targetAgentIdx] : null;
      if (revived) {
        revived.status = 'idle';
        revived.needsDoctor = false;
        const pos = getBurrowIdlePos(ambulance.targetAgentIdx);
        revived.x = pos.x; revived.y = pos.y;
        revived.targetX = pos.x; revived.targetY = pos.y;
        revived.idleActivity = 0; // recovery на диване (case 0 = пьёт пиво, но норм)
        revived.idleTimer = 0; revived.idleAnimT = 0;
        addFloatingText(revived.x, revived.y - 40, '🏥 ВЫЖИЛ!', '#00ff88', 14);
      }
      ambulance.targetAgentIdx = -1;
    }
  }

  // ── PARTICLES & FLOATING TEXT ────────────────────────────
  updateParticles(deltaTime);
  drawParticles();
  updateFloatingTexts(deltaTime);
  drawFloatingTexts();

  // ── FLYING PACKETS (task transfer) ───────────────────────
  updatePackets(deltaTime);
  drawPackets(ctx);

  // ── CRT SCANLINES ────────────────────────────────────────
  drawScanlines();

  // ── HUD (on top of everything) ───────────────────────────
  drawHeader(ctx, W, H);
  drawTicker(ctx, W, H, timestamp / 1000);
}

// ============================================================
// INIT
// ============================================================
window.onload = function () {
  resize();

  if (DEMO_MODE) {
    initDemoMode();
  } else {
    initSupabase();
    // Place agents at their desks initially
    agents.forEach((agent, idx) => {
      const pos = getOfficePos(agent.deskIdx);
      agent.x = agent.targetX = pos.x;
      agent.y = agent.targetY = pos.y;
    });
  }

  // Canvas interaction
  canvas.addEventListener('click', handleCanvasClick);

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width  / rect.width)  / DPR;
    mouseY = (e.clientY - rect.top)  * (canvas.height / rect.height) / DPR;
  });

  // Close popup when clicking outside it
  document.addEventListener('click', e => {
    const popup = document.getElementById('popup');
    if (popup.style.display !== 'none'
        && !popup.contains(e.target)
        && e.target !== canvas) {
      hidePopup();
    }
  });

  // Re-init on resize
  window.addEventListener('resize', () => {
    resize();
    if (DEMO_MODE) initDemoMode();
  });

  // 🚀 Start the loop
  requestAnimationFrame(render);
};
</script>
